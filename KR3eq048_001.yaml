body:
  text: 卷上十二官論心者君主之官也神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安主明主字緊頂上文主字來下文何得云別有一主以此養生則壽歿世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之至道在微變化無窮孰知其原窘乎哉消者瞿瞿孰知其要閔閔之當孰者為良恍惚之數生於毫釐毫釐之數起於度量千之萬之可以益大推之大之其形乃制此書專為八味六味而作欲表彰二方必先講明所以然之故遍閱經文並無其說只有心主之官一語又是斷斷不可用二方者只得將命門二字增入然後二方可為十二官之主藥其作偽之心如此玩內經註文即以心為主愚謂人身別有一主非心也開口即闢內經此乃邪說之根謂之心主之官當與十二官平等不得獨尊心之官為主若以心之官為主則下文主不明則十二官危當云十一官矣此理甚明何注經者昧此耶明明說君主則極尊之稱也何以不得尊之其曰十二官危者蓋主不明則心亦自病也若曰十一官則主不明之病反不在內於義為不備矣蓋此一主者氣血之根生死之關十二經之綱維也或問心既非主而君主又是一身之要然則主果何物耶何形耶何處安頓耶余曰悉乎問也若有物可指有形可見人皆得而知之矣惟其無形與無物也故自古聖賢因心立論而卒不能直指其實因心立論乃是說心不是說命門也據爾言則從古聖賢當以命門立論矣孔門之一貫上紹精一執中之統惟曾子子貢得其傳而二子俱以心悟而非言傳也設以言傳當時門人之所共聞不應復有何謂之問也後來子思衍其傳而作中庸天命之性以中為大本而終於無聲無臭孟子說不動心有道而根於浩然之氣而又曰難言也人因外感內傷而生疾病用草木金石之藥補之瀉之寒之熱之以調其氣此乃極平常之理偏要說到四書六經談性談命傳道等語與疾病何涉即內經所云司天運氣義極精微亦不過指六淫之氣感人耳何嘗大言欺人耶老氏道德經云穀神不死是曰玄牝玄牝之門造化之根又曰恍恍惚惚其中有物佛氏心經云空中無色無受想形識無眼耳鼻舌身意又曰萬法歸一一歸何處夫一也中也性也浩然也玄牝也空中也皆虛名也不得已而強名之也立言之士皆可以虛名著論至於行醫濟世將以何味的為君主之藥而可以綱維一身之疾病耶此段乃其邪說之所從出其云一貫大本難言萬法歸一皆暗指命門為言則古聖賢道統之傳並與心上毫無干涉只是傳此腎中命門之訣而八味六味二方乃是一貫大本難言萬法歸一之補藥此等怪論自開闢以來未之或有小人之欺世至於此極而粗通文理之人觀之不但不怪且以此人為真知孔孟之學者亦大可怪矣腎有二精所舍也生於脊膂十四椎下兩旁各一寸五分形如豇豆相併而曲附於脊外有黃脂包裹里白外黑各有帶二條上條繫於心包下條過屏翳穴後趨脊骨兩腎俱屬水但一邊屬陰一邊屬陽越人謂左為腎右為命門非也命門即在兩腎各一寸五分之間此本舊說然亦影響杜撰之語與內經全不合也當一身之中易所謂一陽陷於二陰之中內經云七節之旁有小心是也名曰命門是謂真君主內經何不言命門者君主之官也乃一身之太極無形可見既云小心何以無形兩腎之中是其安宅也按內經並無命門之說惟靈樞根結篇云太陽根起於至陰結於命門命門者目也衛氣篇亦云命門者目也素問陰陽離合論云太陽根於至陰結於命門王啟玄注云命門者藏精光照之所則兩目也經文所指命門皆以目言蓋以目為五臟六腑精氣所注故曰命門又門者出入開闔之地目之精光內瑩外照而啟閉隨時於門字義為切若腎中一點真陽而謂之門義亦不合其右旁有一小竅即三焦內經明云上焦如霧中焦如漚下焦如瀆乃指腎旁小竅杜撰不倫三焦者是其臣使之官經云三焦者決瀆之官膻中者臣使之官前段明明引過今乃以三焦為命門臣使之官何顛倒如此稟命而行周流於五臟六腑之間而不息名曰相火相者言如天君無為而治宰相代天行化此先天無形之火與後天有形之火不同決瀆之官如何代天行事且命門而指為天君尤為支離其左旁有一小竅乃真陰真水氣也亦無形火無形猶可水如何說無形且真字乃對假而言以三焦及此竅為真火真水將心火腎水為假火假水耶且前竅名三焦此竅又名何物耶上行夾脊至腦中為髓海泌其精液注之於脈以榮四末真陰之氣所泌者何物之精液且何以見得必從髓海中到四末內注五臟六腑以應刻數亦隨相火潛行周身與兩腎所主後天有形之火不同按靈樞營衛生會篇論中焦云此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣又云上焦亦與營俱行於陽二十五度行於陰二十五度一周也經文鑿鑿皆指營氣而言今乃移作腎中水氣杜撰不倫顛倒錯亂真囈語也但命門無形之火在兩腎有形之中為黃庭無形之火前指三焦今又指命門故曰是誰曰五臟之真惟腎為根腎為五臟之真何物為五臟之假耶褚齊賢云人之受胎始於任之兆惟命門先具有命門然後生心心主血有心然後生肺肺主皮毛有肺然後生腎腎主骨髓有腎則與命門合二數備是以腎有兩歧也前云命門在中腎在兩旁今又引腎與命門合為二仍是左右對待之義前後支離如此可見命門為十二經之主腎無此則無以作強而伎巧不出矣膀胱無此則三焦之氣不化而水道不行矣膀胱與三焦鑿然兩腑云膀胱無命門則三焦不化如何接續脾胃無此則不能蒸腐水穀而五味不出矣肝膽無此則將軍無決斷而謀慮不出矣大小腸無此則變化不行而二便閉矣心無此則神明昏而萬事不能應矣將君主之官亦退而聽命於命門尚足當君主之稱耶此所謂主不明則十二官危也此所謂三字竟鑿然以內經亦以命門為主無忌憚已極余有一譬焉譬之元宵之鰲山走馬燈拜者舞者飛者走者無一不具其中間惟是一火耳火旺則動速火微則動緩火息則寂然不動而拜者舞者飛者走者軀殼未嘗不存也走馬燈中之物皆是死物所以惟恃火氣衝突機關而動若五臟六腑各有生氣豈專恃命門耶惟其視五臟六腑皆為死物所以後文別無治五臟六腑之方專恃一八味丸治五臟六腑之病其根皆在此也故曰汝身非汝所有是天地之委形也引莊子語亦與上文不接余所以諄諄必欲明此論者欲世之養身者治病者的以命門為君主而加意於火之一字養身補火已屬偏見況治病必視其病之所由生而一味補火豈不殺人乎夫既曰立命門之火乃人身之至寶何世之養身者不知保養節欲而日夜戕賊此火不節欲亦非專於戕賊此火倘以斫喪之火一概補陽又為殺人之術矣既病矣治病者不知溫養此火而日用寒涼以直滅此火焉望其有生氣耶治法多端原不是專用寒涼亦不是專於補火也經曰主不明則十二官危以此養生則殃戒之戒之余今直指其歸元之路而明示其命門君主之火命門竟指為君火真千古之怪論乃水中之火相依而永不相離也永不相離何以有上越之病耶火之有餘緣真水之不足也毫不敢去火只補水以配火壯水之主以鎮陽光上文俱為八味作地步又恐遺卻六味此處忽然轉出水不足之論邪說害人其苦心亦如此所謂作偽心勞也火之不足因見水之有餘也水有餘之病不知是何形象若是虛寒等證不得為水之有餘若是水腫等證亦不得專於補火總是欺人之大言殺人之捷徑耳亦不必瀉水就於水中補火益火之原以消陰翳所謂原與主者皆屬先天無形之妙非曰心為火而其原在肝腎為水而其主屬肺蓋心脾腎肝肺皆後天有形之物也須以無形之火配無形之水直探其君主之穴宅而求之是謂同氣相求文理不接斯易以入也所謂知其要者一言而終也若夫風寒暑濕燥火六者入於人身此客氣也非主氣也主氣固客氣不能入六淫未入之先專一用補服八味六味無甚害若六淫既感邪已傷正仍一概用二方則非補主氣反補邪氣矣能不殺人耶且無病之人亦何必服藥既服藥則必視人之氣體如何而後制方亦何得專用二方也今之談醫者徒知客者除之漫不加意於主氣何哉縱有言固主氣者專以脾胃為一身之主焉知坤土是離火所生而艮土又屬坎水所生耶命門既是太極何以又屬坎若以坎論則坎水固屬腎而離火又屬心仍不關乎命門矣明乎此不特醫學之淵源有自聖賢道統之傳亦自此不昧將命門為道統言之自覺無恥耶而所謂一貫也浩然也明德也假如孔子云參乎吾道是火孟子云吾善養吾火大學云在明明火豈不絕倒耶玄牝也空中也太極也同此一火而已太極是一團火有是理耶為聖賢為仙為佛不過克全此火而歸之耳小子之一論闡千古之未明見者慎勿以為迂仙佛我不能知若全此火即為聖賢真乃千古之怪論宜其自稱為闡千古之未明也此篇之論專為盡天下之病皆用八味而設便講出儒釋道三教之合一以見八味之不可不用此等亂道無一字連貫稍通文理之人見之宜無不知其狂悖即使其醫道果精見此等議論亦並其醫道而疑之乃世之號為通文理者讀之反以為真知性命之理因此益信其醫學之精而八味竟不但為治病之藥實性命之所繫一日不可廢者嗚呼吾憐趙氏尤憐讀趙氏之書而崇信之者其愚更勝趙氏百倍也太極圖中之白圈相傳無二蓋陰陽未判謂之太極今於白圈之中先有黑白二點為一陰一陽之象然後生出太極來則是易中該云易有兩儀是生太極矣太極圖可改則古聖之書何一不可改乎小人之無忌憚至於此極繫辭曰易有太極是生兩儀周子懼人之不明而製為太極圖無極而太極無極者未分之太極也惟其未分所以為太極豈有未分之時為無極已分之時為太極太極已分則陰陽矣豈得為太極耶太極者已分之陰陽也既名陰陽則不可名太極矣蓋太極動而生陽靜而生陰豈有分為陰陽而猶稱太極者性理之說猶不足與此等無知妄人辨吾恐世之讀之者偶不經意即為所惑貽誤不小也兩腎俱屬水左為陰水右為陽水以右為命門非也命門在兩腎中命門左邊小黑圈是真水之穴右邊小白圈是相火之穴此一水一火俱無形日夜潛行不息兩腎在人身中合成一太極云兩旁俱是腎命門在中間雖非經旨而其言尚有影響至分左為陰水右為陽水又陰水為真水陽水為相火又左一黑圈為真水之穴右一白圈為相火之穴種種杜撰支離真屬囈語按甲乙經脊骨十四椎下有命門穴臍下二寸亦有命門穴此穴名也非真有物如小心者在脊骨之內為太極也若穴而必有物可指將周身七百二十穴竟有七百二十如小心者耶命門在人身之中對臍附脊骨自上數下則為十四節自下數上則為七節內經曰七節之旁有小心是也此句出素問刺禁論云鬲肓之上中有父母七節之旁中有小心王注云小心謂真心神靈之宮室乃指心包言似得小字之意按靈邪客篇論云心者精神之所舍也其臟堅固邪勿能容也故諸邪之在心者皆在心之包絡可知心藏於內必有出入之處別有脂膜結聚於包絡之間形如小心似有此理針者中之即有害故在刺禁之列並非表明小心即命門為十二經之主也豈可因此刺禁中偶及之語遂以一部內經專為小心立論而天下之病專治小心則無不愈乎即晚村亦辨之云曰父母曰小心尊卑自見趙氏單摘此句是欲以小心為父母之主也恐與經旨不合此晚村一隙之明也或又問曰如上所言心為無用之物耶古之聖賢未有不以正心養心盡心為訓與醫病何干而先生獨外心以言道恐心外之道非至道也余曰仔細玩經文自得之矣經曰神明出焉則所繫亦重矣豈為無用哉盍不觀之朝廷乎皇極殿是王者嚮明出治之所也乾清宮是王者嚮晦晏息之所也指皇極殿而即謂之君身可乎蓋元陽君主之所以為應事接物之用者皆從心上起經綸故以心為主至於棲真養息而為生生化化之根者獨藏於兩腎之中故尤重於腎其實非腎而亦非心也云元陽為君身心是皇極殿腎是乾清宮是君身在皇極殿則不在乾清宮在乾清宮則不在皇極殿其理甚彰然則元陽到心則有心火而無腎火到腎則有腎火而無心火有心火之時腎惟一團陰頑之氣有腎火之時心遂為空空蕩蕩之物向也以命門為主今又以命門之君主即心之君主心之君主即命門之君主而心與命門皆是空器皆非君主前後背謬真乃隨口亂道非其人有失心之疾者斷不至如此猖狂也晚村批云此段語甚活大抵呂氏之心先死也呂氏評曰自許學士開補脾不如補腎之理薛院使因之用八味六味通治各病通治各病四字何等不通病是何物而可通治耶趙氏又從薛氏發明其要一歸之命門一歸之八味益火二字乃全書之宗旨也其提闡快當親切處有前此所未及者真立齋之功臣矣蘇氏所謂其父殺人報仇其子必且行劫正此之謂也顧病機傳變輾轉相因治法逆從淺深異用趙氏所言皆窮源返本之論撥亂救弊功用甚大各病有各病之本原各病有各病之偏弊若一概用八味一方則正大亂之道矣然以之治敗證則神效敗證亦有補瀉寒熱虛實上下之不同若一概用八味則八味直是起死之金丹矣而以治初病則多疏蓋緣主張太過立言不能無偏遂欲執其一說而盡廢諸法亦不可行也學者識其指歸以明生化斡旋之機又當詳考古今立法相因異用之故斯為十全若徒喜其直捷簡易以為高則鹵莽滅裂夭枉無窮亦非趙氏所以濟世之心也此人直是欺世亦何嘗有濟世之心且彼亦並不料世之盡為所欺至於如此之貽害量彼亦深悔於九原也陰陽論陰陽之理變化無窮不可盡述姑舉其要者言之夫言陰陽者或指天地或指氣血或指乾坤此對待之理其實陽統乎陰天包乎地血隨乎氣故聖人作易於乾則曰大哉乾元乃統天於坤則曰至哉坤元乃順承天古人善體易義治血必先理氣血脫益氣故有補血不用四物湯之論四物湯本為補血而設謂不得專用則可謂不用則不可如血虛發熱立補血湯一方以黃耆一兩為君當歸四錢為臣氣藥多而血藥少使陽生陰長又如失血暴甚欲絕者以獨參湯一兩頓煎服純用氣藥斯時也有形之血不能速生幾微之氣所當急固使無形生出有形血驟脫者氣亦隨之而脫勢極危殆故用補氣之藥以固之使不全脫然後漸用補血之品以填之生之非謂一時之氣即能生血也即氣固之後仍當大補其血而以氣藥佐之亦非專補氣也蓋陰陽之要原根於無也故曰無名天地之始忽引老子語甚覺無謂不倫生死消長陰陽之常度豈人所能損益哉聖人裁成天地之化輔相天地之宜每寓扶陽抑陰之微權方復而先憂七日之來未濟而預有衣袽之備血脫之後陰已大虧尚欲抑之必使全然無陰而後已耶且既欲抑之又何必補氣以生之蓋扶陽抑陰又是一義非補氣不補血之謂若云聖人扶氣抑血成何語耶總之此人心理已絕凡所引證皆全然不思隨口亂道本無足責所恨者崇信之人耳防未然而治未病也現在血脫而將死此時救之不暇便欲防其血太盛而成他病耶神農嘗藥按陰陽而分寒熱溫涼辛甘酸苦鹹之辨凡辛甘者屬陽溫熱者屬陽寒涼者屬陰酸苦者屬陰陽主生陰主殺司命者欲人遠殺而就生甘溫者用之辛熱者用之使其躋乎春風生長之域一應苦寒者俱不用神農本草上品藥中寒熱相半內經論司氣勝復宜寒宜熱亦相半歷古以來所傳養生方中寒熱溫涼亦間雜互用此有目所共見乃敢肆然曰一應苦寒俱不用此真喪心之語據所云則神農本草宜只載溫熱諸品其餘俱編入毒藥條內禁用可也要之服藥原是治病無病本不必服藥內經云五穀為養五果為助五菜為充毒藥攻邪凡藥用之不當而或太過皆有毒故古人謂人參甘草皆能殺人惟六淫七情有偏勝則以藥救之且內經云寒者熱之熱者寒之溫者清之清者溫之何等明白乃不問病之何因而一概禁寒用熱能不十殺其五耶不特苦寒不用至於涼者亦少用蓋涼者秋氣也萬物逢秋氣不長矣服藥原為治病而設並非藉以生長氣血也天上地下陰陽之定位然地之氣每交於上天之氣每交於下故地天為泰天地為否聖人參贊天地有轉否為泰之道如陽氣下陷者用味薄氣輕之品若柴胡升麻之類舉而揚之使地道左旋而升於九天之上陰氣不降者用感秋氣肅殺而生若瞿麥萹蓄之類抑而降之使天道右旋而入於九地之下此東垣補中益氣湯萬世無窮之利不必降也升清濁自降矣動筆便自相背謬據云地天為泰天地為否則宜乎陽降而陰升矣乃反欲升陽而降陰是欲反泰為否也據云瞿麥萹蓄降濁降陰於九地之下又云不必降也升清而濁自降矣種種背謬總是慣以大言欺人全不思其中義理所以如此須知轉否為泰何等關係而僅以升柴瞿萹當之本無是理且補中益氣湯不過因胃陽因濕下陷以此提出陽分耳不必著此大話頭也年月日時皆當各分陰陽此其大略也獨甲子運氣內經雖備言之往往不驗當時大撓作甲子即以本年本月本日本時為始統紀其數如此未必直推至上古甲子年甲子月日時為曆元也將千古聖人不易之論竟決然斷定指為無稽之談爾知上古甲子確是何年何月大撓且不足憑誰為可憑者耶小人之無忌憚固不足責讀者見此等荒唐而不駭亦有喪心之疾者也內經特明氣運有如許之異民病亦有如許之別如此讀內經者不可執泥譬如大明統歷選擇已定竟將千古陰陽家言及選擇錄命占候等書一味抹殺翻覺痛快細思之不能不啞然失笑也可信乎不可信乎陽一而實陰二而虛蓋陰之二從陽一所分故曰秉全體月有盈虧人之初生純陽無陰賴其母厥陰乳哺而陰始生如此說則小兒止有命門並無左腎直待乳哺足方生出左腎來蓋純陽無陰者謂小兒正當發生之時乘初陽之氣生氣極旺猶如四時之春陽氣方張不必更助其陽非謂其體中全無陰氣也何得扯合是以男子二八而精始通六十四而精已竭女子二七而經始行四十九而經已絕人身之陰止供三十年之受用可見陽常有餘陰常不足前段要扶陽抑陰此處又要扶陰抑陽總是隨口亂道況縱欲者多節欲者少故自幼至老補陰之功一日不可缺此陰字指陰精而言不是泛言陰血今之四物湯補陰者誤也補血亦有時必用何以必不可補蓋補陰補血補精確是三項事補陰不專指精血言而精血則皆屬陰也此段議論專要放出六味來所以作此地步談陰陽者俱曰氣血是矣詎知火為陽氣之根水為陰血之根易有太極是生兩儀兩儀生四象則五行乃陰陽所分豈有水火反為陰陽之根者盍觀之天地間日為火之精故氣隨之月為水之精故潮隨之然此陰陽水火又同出一根朝朝稟行夜夜覆命周流而不息相偶而不離惟其同出一根而不相離也故陰陽又各互為其根陽根於陰陰根於陽無陽則陰無以生無陰則陽無以化從陽而引陰從陰而引陽各求其屬而窮其根也世人但知氣血為陰陽而不知水火為陰陽之根能知水火為陰陽而誤認心腎為水火之真此道之所以不明不行也試觀之天上金木水火土五星見在而日月二曜所以照臨於天地間者非真陰真陽乎內經之論陰陽極為明白曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也又曰陽化氣陰成形又曰水為陰火為陽又曰陰勝則陽病陽勝則陰病又曰陰陽者氣血之男女也左右者陰陽之道路也水火者陰陽之徵兆也陰陽者萬物之能始也故曰陰在內陽之守也陽在外陰之使也其言陰陽也詳而且明故五臟合言之則心肝陽而肺腎陰分言之則五臟各有陰陽惟腎有兩則左屬水而為陰右屬火而為陽人之元氣藏於腎中腎之陰陽必宜保護不宜戕賊比諸臟為尤重何等明白乃幻成真假無形有形根源太極等語其說愈微妙愈俚鄙荒唐意在欺世實自欺耳人身心肝脾肺腎五行具存而所以運行五臟六腑之間者何物乎有無形之相火行陽二十五度無形之腎水行陰亦二十五度行陽行陰內經指榮衛言辨見前而其根則原於先天太極之真此所以為真也一屬有形俱為後天而非真矣非根矣謂之根如木之根而枝葉所由以生也如此說則八味六味之能補真陽真陰竟是補太極矣嗟乎五臟六腑孰非有形之體草根木皮亦孰非有形之物不過氣性各殊藉以補偏救弊耳何必過高其論自投魔境乎既有真陰真陽何謂假陰假陽曰此似是而非多以誤人不可不知如人大熱發躁口渴舌燥非陽證乎余視其面色赤此戴陽也切其脈尺弱而無力寸關豁大而無倫此係陰盛於下逼陽於上假陽之證余以假寒之藥從其性而折之頃刻平矣如人惡寒身不離復衣手足厥冷非陰證乎余視其面色滯切其脈澀按之細數而有力此係假寒之證寒在皮膚熱在骨髓余以辛涼之劑溫而行之一汗即愈此亦有不可汗者凡此皆因真氣不固故假者得以亂其真陰盛格陽陽盛格陰此病變之不同何得指為真氣不固此亦專欲為用八味地步耳假陽者不足而示之有餘也假陰者有餘而示之不足也此假字又與前真字不對前所云真者謂先天真元之氣非後天及諸臟之氣耳此乃以陰盛似陽陽盛似陰之證對真而言則前所云真乃指熱為實熱寒為實寒也不荒謬之甚乎總之真字本不通之至一身之中原無所謂假陰假陽也既已識其假矣而無術以投其欲彼亦扞格而不入經曰伏其所主而先其所因其始則同其終則異可使去邪而歸於正矣五行論以火言之有陽火有陰火有水中之火有土中之火有金中之火有木中之火陽火者天上日月之火生於寅而死於酉陰火者燈燭之火生於酉而死於寅此對待之火也水中火者霹靂火也即龍雷之火無形有雷即有電何謂無形而有聲不焚草木得雨而益熾見於季春而伏於季秋原夫龍雷之見者以五月一陰生水底冷而天上熱龍為陽物故隨陽而上升驚蟄已後龍已漸升何待五月欲遷就已說遂不顧義理如此冬至一陽來復故龍亦隨陽下伏然則冬至以前一陽未生水底終日寒冷龍竟日日在天上耶豈非笑談雷亦收聲人身腎中相火亦猶是也平日不能節欲以至命門火衰腎中陰盛不節欲有傷陰者有傷陽者何得專指為火衰若云陰盛則精脫者必陰虛豈有陰反盛者耶龍火無藏身之位故遊於上而不歸是以上焦煩熱咳嗽等證善治者以溫腎之藥煩熱咳嗽明系陰虛溫腎藥豈可亂投從其性而引之歸原使行秋冬陽伏之令而龍歸大海此至理也奈何今之治陰虛火衰者以黃柏知母為君而愈寒其腎益速其弊良可悲哉滋陰以治虛火苦寒以治實火此一定之法至庸醫之誤治原非正法也金中火者凡山中有金銀之礦或五金埋瘞之處夜必有火光此金氣非火光也此金鬱土中而不得越故有光耀發見於外人身皮毛空竅中自覺針刺蚊咬及巔頂如火炎者此肺金氣虛火乘虛而現肺主皮毛故也肺家之火何得專屬皮毛凡咳嗽聲啞面熱氣悶肺痿肺癰吐血消渴種種大證皆是肺火之證而乃遺卻何故經曰東方木實因西方金虛也既曰肺火何以又曰肺虛補北方水即所以瀉南方火雖曰治金中之火而通治五行之火無餘蘊矣金中之水礦中之水銀是也水銀乃未成之金也何得指之為水在人身為骨中之髓至精至貴人之寶也巽木中水者巽木入於坎水而上出其水即木中之脂膏巽木入坎水乃是井卦之象豈木中之水耶然則凡井中之水皆木中之脂膏耶欲欺人而又不深思遂亂道如此人身足下有湧泉穴湧泉屬腎何以指為木中之水肩上有肩井穴此暗水潛行之道凡津液潤布於皮膚之內者皮膚之內亦非木中之水皆井泉水也夫水有如許之不同總之歸於大海天地之水以海為宗人身之水以腎為源而其所以能晝夜不息者以其有一元之乾為太極耳一元之乾為太極試看此七字有一字連貫否醉生夢死之人談理談性本不足與辨特無恥已極為可厭耳此水中之五行也明此水火之五行而土木金可例推矣中風論中風之病愚意謂邪之所湊其氣必虛外感者間而有之間字當作五百年間出之間當專主虛論不必兼風明明說是中風乃非但云不盡是風並云不必兼風當時聖人何不竟云純虛之證反將五百年間出之病立為名號使人因名責實竟作風病治誤人不淺耶譬如論中暑病而曰不必兼暑中寒病而曰不必兼寒即有之亦五百年間出之事豈成說話乎蓋真中風則專以風治類中風則病各有因視其所感何因而分別治之何等明白穩當要其意專欲以八味六味二方治此病則不得不先以此病為純虛之證也是何肺腸河間東垣治中風專治本而不治風可謂至當不易之論即名中風又專治本而不治風則是本原虛弱之病不是中風矣況劉李之書具在雖各有所偏並無專治本不治風之說豈可誣之學者必須以陰虛陽虛為主自後醫書雜出使後學狐疑不決陰虛用六味陽虛用八味自古並無以此二方治中風者何嘗醫書雜出之後始不專用二方耶或問人有半肢風者必須以左半身屬血右半身屬氣豈復有他說乎曰未必然人身劈中分陰陽水火男子左屬水右屬火女子左屬火右屬水男子半肢風者多患左女子半肢風者多患右即此觀之可見以陰虛為主左右一定之位何嘗以男女而別蓋左屬陽而右屬陰男陽女陰故病亦分屬然亦非盡如此者若以此為一定之病則男子患右女子患左者又何說耶或問曰當此之時小續命湯可用乎曰未必然小續命湯此仲景金匱要略治冬月直中風寒之的方即麻黃桂枝之變方也此又亂道直中風寒四字已屬不接冬月二字又是增出金匱第五篇載此方於中風歷節條下乃風痹風痱之風與麻黃桂枝治傷寒傷風者何涉其方下注云治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側何等明白曾不一見耶其間隨六經之形證逐一加減未便可按方統用其全方也中風之證雖亦有各經之殊然亦不過有一二現證豈如傷寒之鑿鑿可分者加減法皆後人所擬非金匱原方所有也如太陽無汗於本方中倍麻黃杏仁防風如有汗惡風於本方中倍桂枝芍藥杏仁如陽明無汗身熱不惡風於本方中加石膏無汗不得用白虎何得反用石膏知母甘草有汗身熱不惡風於本方中加葛根有汗不可更發何得反用葛根桂枝黃芩如太陽無杆身涼於本方中加附子乾薑甘草少陰經中有汗無熱於本方中加桂枝附子甘草凡中風無此四證六經混淆繫於少陽厥陰或肢節攣痛或麻木不仁每續命湯八兩加羌活四兩連翹六兩此係六經有餘之表證須從汗解如有便溺阻隔宜三化湯或局方麻仁丸通利之雖然邪之所湊其氣必虛世間內傷者多外感者少間而有之既云邪之所湊則邪非外感而何此方終不可輕用考補小續命湯麻黃人參黃芩白芍防己桂枝川芎防風甘草附子杏仁石膏當歸傷寒論傷寒專祖仲景凡讀仲景書須將傷寒與中寒分為兩門始易以通曉傷寒從來無人以中寒併為一病者即同一傷寒亦有傷風傷寒之不同況本屬兩病耶為因年久殘缺補遺註釋者又多失次錯誤幸歷代考證者漸明逮陶節庵六書吳綬蘊要二書刊行而傷寒之理始著二書卻是自開簡便門戶不足以發明仲景仲景書細續本自了然也予於至理未暇詳辨先將傷寒中寒逐一辨明庶不使陰陽二證混亂此中寒其意蓋指直中陰經之傷寒言若雜症之中寒別是一病非傷寒也非直中也乃寒邪太甚入於肌膚血脈或內連臟腑陽氣為寒氣所束不能和通現種種畏寒等證不依經傳變亦不必盡在冬月此感冒之至重者其法以溫中散寒為主亦不得概用辛熱之藥使寒氣與熱氣相爭而無出路則立死矣夫傷寒治之得其綱領不難也若求之多歧則支離矣先以陽證言之夫既云傷寒則寒邪自外入內而傷之也其入則有淺深次第自表達里先皮毛次肌肉又次筋骨傷寒之病不入筋骨腸胃此其漸入之勢然也若夫風寒之初入必行太陽寒水之經便有惡風惡寒頭痛脊痛之證寒鬱皮毛是謂表證三陽皆是表證何獨以太陽為表若在他經則無此證矣三陽亦有兼證脈若浮緊無汗為傷寒以麻黃湯發之得汗為解浮緩有汗為傷風用桂枝湯散邪汗止為解桂枝湯非止汗之藥乃解肌之藥也傷風自汗乃邪汗汗雖出而熱仍不已故用桂枝湯和其營衛仍令微微出汗而解此謂之正汗但不若麻黃之發汗為稍甚耳若云汗止則桂枝反為止汗之藥邪風將何從出耶若無頭疼惡寒脈又不浮此為表證罷而在中中者何表裡之間也乃陽明少陽之分脈不浮不沉在乎肌肉之間謂皮毛之下也然有二焉若微洪而長即陽明脈也外證鼻乾不眠用葛根湯以解肌脈弦而數少陽脈也其證脅痛耳聾寒熱往來而口苦以小柴胡湯和之蓋陽明少陽不從標本從乎中治也若有一毫惡寒尚在表雖入中還當兼散邪過此為邪入里為實熱脈不浮不沉沉則按至筋骨之間方是若脈沉實有力外證不惡風寒而反惡熱譫語大渴六七日不大便明其熱入里而腸胃燥實也輕則大柴胡湯重則三承氣湯大便通而熱愈矣以陰證言之若初起便怕寒手足厥冷或戰慄倦臥不渴兼之腹痛嘔吐泄瀉或口出涎沫面如刀刮不發熱而脈沉遲無力此為陰證上文說三陽經證此處便當接三陰傳變之證乃不竟其說反以直中陰經之證當之何也不從陽經傳入熱證治例直中陰經固宜用辛熱之品而陽經傳入三陰之證其間熱極宜涼者固多如上文諸寒證亦復不少即下文理中姜附等湯皆仲景治陽經傳入陰經之方未嘗為直中陰經設也更當看外證如何輕則理中湯重則姜附湯四逆湯以溫之由此觀之可見傷寒者由皮毛而後入腑臟初雖惡寒發熱而終為熱證傳入三陰亦非盡熱證矣其人必素有火者有火之人卒遇大寒何嘗無中寒之病中寒者直入臟腑始終惡寒而並無發熱等證其人必無火者無火之人熱邪入里何嘗無極熱之證若如此則仲景當時著傷寒論不必細細分別只問其人之素體而寒熱立辨矣豈非譫語耶一則發表攻裡一則溫中散寒兩門判然明白何至混雜使人疑誤耶此則以傳經為陽證直中為陰證至傳經之三陰證則置而不論豈傳經即直中耶抑三陰宜溫之證亦陽證耶矇混已極桂枝湯治太陽經傷風發熱自汗惡風桂枝芍藥甘草桂枝湯中薑棗為至要之品成無己注云以甘緩之以辛散之是也開卷第一方而五味之中遺去二味何耶葛根湯赤芍葛根蔥白生薑桂枝麻黃甘草大棗古時芍藥赤白不分而傷寒方亦從無用赤芍者彼之改白為赤者蓋俗醫每以白芍為收斂之品不宜用於疏表之方也然則桂枝湯亦用赤芍耶葛根湯中並無蔥白傷寒論中惟少陰經中白通湯等三四方溫散腎邪用之與陽明無涉也治陽明胃經目痛鼻乾不寐如有惡寒證本方加麻黃惡風加桂枝如正陽明腑病不惡寒有汗而渴當用白虎湯正陽陽明腑病是胃家實也承氣湯主之仲景論之甚明若白虎則治陽明經汗出煩渴之證與腑病迥別此最大關節經文鑿鑿誤治立死矣小柴胡湯治少陽膽經耳聾脅痛寒熱往來口苦柴胡黃芩甘草小柴胡只載三味遺去人參半夏薑棗四味全不成方最為怪誕蓋小柴胡之得名專以有人參也用大黃則為大柴胡矣今去人參已失原方之義況並去半夏之辛散以治煩嘔去薑棗之甘辛以和營衛而只此三味何以治少陽諸證耶此經無出入路不可汗下止有此湯和解之如兼陽明證本方加葛根芍藥如尚有惡寒等證用大柴胡湯惡寒則病尚在表大黃豈可輕用惟往來寒熱則可用耳兼表兼下大柴胡湯表證未除而里證又急汗下兼行柴胡黃芩芍藥半夏人參大黃枳實大柴胡本無人參偏加入人參小柴胡原有人參偏去人參變亂古方是何肺腸白虎湯治身熱大渴而有汗脈洪大者如無渴者不可用此藥為大忌倘是陰虛發熱服之者死若五六月暑病者必用此方又當審其虛實石膏知母甘草人參竹葉糯米此又矇混之極者白虎湯治陽明外熱之證只有石膏知母甘草粳米四味至煩渴甚者用白虎加人參湯又是一方至於人參竹葉同用又是竹葉石膏湯中之藥俱不得竟指為白虎湯也至以糯易粳尤為不典小承氣湯治六七日不大便腹脹滿悶病在太陰無表證汗後不惡寒潮熱狂言而喘者此又大誤害人者太陰病皆屬寒邪傷寒太陰全篇無純用寒下之法即有用大黃者亦與桂枝同用謂之溫下一用寒涼必斃此第一大關節也乃以此為太陰之藥豈不誤極蓋小承氣乃陽明正藥正與太陰相反況太陰病豈有汗後潮熱狂言等證真乃自得狂疾發此狂談也大黃厚朴枳實大承氣湯治陽明太陰譫語太陰無用承氣法辨在前五六日不大便腹滿煩渴並少陰舌乾口燥日晡發熱少陰並無日晡發熱之證日晡發熱者陽明也脈沉實者大黃厚朴枳實芒硝四逆散治陽氣亢極此是熱邪漸深至於少陰壅遏經絡故用此以宣通之若雲陽氣亢極則惟有急下之法四逆諸品何能愈之故成無己云邪在三陽則手足熱在太陰則手足溫在少陰則熱漸深手足逆而不溫也用四逆散以散傳經之熱此為正解血脈不通四肢厥逆在臂脛之下若陰證則上過乎肘下過乎膝以此為辨也柴胡芍藥甘草枳實仲景傷寒論中諸方字字金科玉律不可增減一字猶之錄六經四子語豈可擅自刪改將杜撰之語亂入耶惟臨病增減未嘗不可因證出入若抄錄古方先為變易仍指為某方則大亂之道矣此人凡引錄唐宋諸方皆非原本其方本非聖經姑不置辨乃漢以前諸方歷古無人敢易一字而錯誤如此則後人以偽傳偽全失制方之義為害不小矣初病無熱便四肢厥冷或胸腹中滿或嘔吐腹滿痛下痢脈細無力此自陰證受寒即真陰證非從陽經傳來便宜溫之不宜少緩經云發熱惡寒者發於陽也無熱惡寒者發於陰也治宜四逆湯此又亂道之至者發熱二句傷寒論開卷即載乃指傷風傷寒而言人人皆見何嘗以無熱句為陰證耶無熱惡寒乃太陽經宜麻黃湯發汗之證四逆湯乃太陰少陰經宜溫里之證遠隔三四經將治宜四逆湯連屬上文治正相反一投即斃可恨極矣腹滿腹痛皆是陰證只有微甚不同治難一概腹痛不大便桂枝芍藥湯腹痛甚桂枝大黃湯此又殺人之術也仲景治太陰條中雲大實痛者桂枝大黃湯主之此乃傳經熱邪陷入太陰故兼表兼下若以之治直中純寒之證而用大黃則寒邪益陷而下脫其危可立待也若自利腹痛小便清白宜溫中理中四逆看微甚用輕者五積散重者四逆湯無脈者通脈四逆湯使陰退而陽復也予又有說焉若讀傷寒書而不讀東垣書則內傷不明而殺人多矣讀東垣書而不讀丹溪書則陰虛不明而殺人多矣讀丹溪書而不讀薛氏書則真陰真陽不明而殺人亦多矣此又隨口亂道矣豈有仲景不知內傷東垣不知陰虛之理至真陰真陽則尤為邪說從古無真陰真陽之論此乃薛氏自創之邪說已前諸公豈能預料後世有創造邪說之人而先講明之耶蓋仲景論傷寒則說傷寒傷寒中何得以內傷立論東垣論內傷則說內傷內傷中何得以陰虛立論丹溪論陰虛則說陰虛陰虛中何得以真假立論彼所謂真者指腎中之陰陽也然謂五臟各有陰陽則可謂腎為真余為假則不可東垣曰邪之所湊其氣必虛世間內傷者多外感者間而有之此間字當作五百年間出之間甚言其無外感也明明云邪之所湊乃云非外感則邪是何邪湊將安湊耶若五百年間出之間則是千中無一直云內傷中無傷寒可矣何以又入傷寒條內耶東垣脾胃論與夫內傷外感辨深明飢飽勞逸發熱等證俱是內傷悉類傷寒切戒汗下東垣原指內傷之類傷寒者不可從傷寒治並非指天下之傷寒皆內傷也引書失旨自誤誤人以為內傷多外感少只須溫補不必發散外感多而內傷少者溫補中少加發散以補中益氣湯一方為主加減出入如內傷兼傷寒者以本方加麻黃兼傷風者以本方加桂枝兼傷暑者本方加黃連兼傷濕者本方加羌活查東垣脾胃論調中益氣條下並無此等加減法不知出於何書當時方法之亂原自東垣啟其端然尚不至如此之甚總之治病必求其本一病自有一方自然隨手皆效必立一方以治盡天下之病開簡便之路為下愚立法則必自陷於下愚之境蓋醫者人命所關固至難極重之事原不可令下愚之人為之也實萬世無窮之利東垣特發明陽虛發熱之一門也陽虛發熱從來所無經云陽虛生外寒未聞陽虛反發熱者若陽虛外越之證則又是一類正與補中益氣治法相反投升柴即死也然世間真陰虛而發熱者十之六七亦與傷寒無異傷寒桂枝麻黃二證俱在豈有陰虛發熱而類此者真怪談也反不論及何哉今之人一見發熱則曰傷寒須用發散發散而斃則曰傷寒之法已窮奈何豈知丹溪發明之外尚有不盡之旨乎予嘗於陰虛發熱者見其大熱面赤口渴煩躁與六味地黃大劑一服即愈若繫有外邪者服六味未必即死而病必無愈期余見此等誤治而遷延以死者不可勝計所以痛心疾首而批此書若其偶愈者則必其邪氣甚微兼有浮火之人耳如見下部惡寒足冷上部渴甚燥極或欲飲而反吐即於六味湯中加肉桂五味甚則加附子冷飲下咽即愈此陽虛之證附桂原不禁用但或邪氣未盡則熟地五味萸肉俱能留邪為害也且舉傷寒口渴一證言之邪熱入於胃腑消耗津液故渴恐胃汁干急下之以存津液其次者但云欲飲水者不可不與不可多與並無治法縱有治者徒知以芩連知柏麥冬五味天花粉甚則石膏知母以止渴此皆有形之水以沃無形之火安能滋腎中之真陰乎若以六味地黃大劑服之其渴立愈何至傳至少陰而成燥實堅之證乎口渴宜下有二證一則熱邪在陽明一則熱邪傳少陰下之所以驅邪使出也若以熟地萸肉補之斂之安有不死者況六味為腎經滋補之藥當邪火未入少陰之時反引入少陰使邪氣斂藏而無出路從此之後雖小疾亦無愈期而多變證矣近日庸醫凡遇有邪而用此藥者以後百藥不效不咎其用六味之害反以為曾用過六味而猶不效真絕證也嗚呼傷哉既成燥實堅之證仲景不得已而以承氣湯下之此權宜之霸術然諄諄有虛人老弱人之禁故以大柴胡代之八味湯即仲景之方也去桂附而為六味諒亦可深思而得之乃計不出此而造承氣之霸術又自知此方之為害造大柴胡代之仍就不離大黃等峻藥其譏訕仲景之愚昧誤人如此嗚呼下愚之無忌憚至於此極真病狂之人本不足與辨所以辨者為天下有一隙之明者亦為所惑而不察也陶氏以六一順氣湯代之豈以二湯為平易乎代之而愈所喪亦多矣況不愈者十之八九哉又一不知六味者當時若多用六味地黃飲子大劑服之取效雖緩其益無窮果系傷寒死不旋踵耳況陰虛發熱者小便必少大便必實其上證口渴煩躁與傷寒無異云與傷寒無異則實非傷寒矣前後背謬如此彼之承氣者不過因亢則害下之以承真陰之氣也真陰之氣如何承夢話也予今直探其真陰之源而補之如亢旱而甘霖一施土木皆濡頃刻為清涼世界矣何不可哉況腎水既虛矣復經一下之後萬無可生之理如果腎虛之證則絕不是傷寒仲景從未嘗以承氣治虛勞如系傷寒則仲景當日用承氣亦不一矣竟無一生者耶慎之慎之吾為此懼故於補天要論中詳言之合而言之真知其為陽虛也則用補中益氣湯陽虛者最懼越上為害反用升柴以提之乃速之死也東垣制此方為胃陽下陷而設非泛指陽虛也如此誤解即東垣亦不瞑目於地下矣真知其為陽虛直中也則用附子理中湯真知其為陰虛也則用六味腎氣湯如有邪不得用真知其為陰虛無火也則用八味腎氣湯有邪亦不得用其間有似陰似陽之假證也則用寒因熱用之法從之不可少誤惟以補正為主不可攻邪正氣得力自然推出寒邪汗出而愈前此泛說不辨邪之有無已屬糊塗此處直云不可攻邪竟不論何經傷寒只將六味八味二方大劑與服使熟地桂附等發汗而愈將仲景當日一片苦心千年奉為章程者一齊抹卻下愚之無忌憚至此而極可悲也夫攻之一字仁人之所惡也養奸豢盜仁政然乎百戰百勝戰之善者也不戰而屈人之兵善之善者也故曰善戰者服上刑傷哉仲景殺無赦矣呂氏曰正氣得力二句灼然妙理與景岳論參看更明自然二字妙甚從東垣補中益氣論來此等絕滅天理之談獨有會心讚歎如此其肺腸亦不可問矣溫病論治溫病者將如何予有一法經曰不惡寒而渴者是也不惡寒則知其表無寒邪矣曰渴則知其腎水乾枯矣溫病非少陰之證且渴者多屬陽明何以知其必腎干也蓋緣其人素有火者冬時觸冒寒氣雖傷而亦不甚惟其有火在內寒亦不能深入所以不即發而寒氣伏藏於肌膚溫是天氣非指人之本體也如此說將無火之人入春便變為寒病耶是何等人一定生何等病矣自冬至三四月歷時既久火為寒鬱於中亦久將腎水熬煎枯竭從無外感之邪藏於腎中半年而發者蓋甲木陽木也藉癸水而生腎水既枯至此時強木旺無以為發生滋潤之本故發熱而渴非有感冒也明明說是冬時觸冒寒氣又云非有感冒何前後矛盾也海藏謂新邪換出舊邪非也換字何等不通若復有所感表又當惡寒矣予以六味地黃滋其水以柴胡辛涼之藥舒其木鬱隨手而應此方活人者多矣柴胡為少陽疏散之藥加入腎經滋補藥中將引六味入少陽耶將並柴胡納入少陰耶制方之義已絕彼曾駁人參不可入六味中乃柴胡反可入六味真喪心之談也予又因此而推廣之凡久時傷寒者亦是鬱火證既是傷寒何云鬱火若其人無火則為直中矣有火者變為溫病無火者便是直中天下竟無傳經正傷寒矣且直中是至險之證豈可派定無火人必患此耶惟其有火故由皮毛而肌肉而腑臟傷寒無不由皮毛入者豈必有火之人為然今人皆曰寒邪傳裡寒變為熱既曰寒邪何故入內而反為熱又何為而能變熱耶不知即是本身之火為寒所鬱而不得泄一步反歸一步日久則純熱而無寒矣所以用三黃解毒解其火也升麻葛根即火鬱發之也三承氣即土鬱奪之小柴胡湯木鬱達之也此理甚簡而易只多了傳經六經諸語支離多歧傷寒傳經之說自內經熱論及仲景傷寒論諸書相傳以來數千年守之不變淺學不能全窺少有所誤非殺人即寡效然無有能出範圍者今乃敢肆然以為無傳經六經等法且譏訕古聖以為支離多歧此天理絕滅之談原無足辨但恐世之崇信者終無悟日故又不能已於言也凡雜證有發熱者皆有頭疼項強目痛鼻乾脅痛口苦等證何必拘為傷寒局傷寒方以治之也雜證原不必守定傷寒法但傷寒諸方加減出入雜證所不能外惟六味則斷斷無治雜感之理也余於冬月正傷寒獨麻黃桂枝二方作寒鬱治郁亦增出其餘但不惡寒者作鬱火治鬱火另是一證非傷寒類也此二語專為欲用逍遙散而設此不佞之創論也聞之者孰不駭然吐舌及閱虞天民醫學正傳傷寒篇云有至人傳曰傳經傷寒是郁病如此亂道不知是何等至人餘一見之不覺竊喜以為先得我心之同然及考之內經帝曰人傷於寒而傳為熱何也岐伯曰寒氣外凝內郁之理之理二字何等文理腠理堅緻玄府閉密則氣不宣通濕氣內結與濕何涉中外相薄寒盛熱生寒極生熱改為寒盛熱生便不接故人傷於寒轉而為熱汗之則愈則外凝內郁之理可知觀此而余以傷寒為鬱火者不為無據故特著郁論一篇此偽造內經又怪異之極者內經熱論云人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死帝曰願聞其狀下文岐伯即以傷寒傳經及兩感病狀分別言之明白詳悉何嘗有外凝內郁等語偽造經文無忌俾已極至云傳而為熱尤不懂人事蓋傷寒第一日在太陽即已發熱不必傳也故本經名為熱論今改則字為傳字彼固不知寒之何以為熱所以上文造出有火無火等邪說也郁病論內經曰木鬱則達之火鬱則發之土鬱則奪之金鬱則泄之水鬱則折之然調其氣過者折之以其畏也所謂瀉之內經五法之注乃出自張子和非啟玄舊文故多誤無稽之談隨口而出可怪予既改釋其誤又推廣其義以一法代五法自古從無一法可代幾法者若爾此書何止可代五法直以六味八味代儘自古以來萬病萬法也神而明之屢獲其效故表而書之蓋東方先生木木者生生之氣即火氣空中之火附於木中木鬱則火亦鬱於木中矣在木中則非空中矣不特此也火鬱則土自郁土鬱則金鬱而水亦郁矣然則非五郁乃一郁也此五行相因自然之理惟其相因也予以一方治其木鬱則諸郁皆因而愈一方者何逍遙散是也方中惟柴胡薄荷二味最妙蓋人身之膽木乃甲木少陽之氣何以只是膽不是肝氣尚柔軟象草穿地始出而未伸此時被寒風一郁何以郁必由寒風即萎軟抑遏而不能上伸不能上伸則下克脾土而金水並病矣何以一病並皆病惟得溫風一吹鬱氣即暢達蓋木喜風肝為風臟最惡者風反云喜風風搖則舒暢若寒風則畏矣溫風者所謂吹面不寒楊柳風也木之所喜也柴胡薄荷辛而溫者柴胡薄荷正驅風之藥非即風也真乃亂道惟辛也故能發散溫也故入少陽立方之妙如此其甚者方中加左金丸左金丸止黃連吳茱萸二味黃連但治心火吳茱萸氣燥黃連獨非寒藥乎且肝最畏燥者以風為燥氣又燥能傷血也肝之氣亦燥同氣相求故入肝以平木同氣相求如何反能平之木平則不生心火火不刑金而金能制木不直伐木而佐金以制木此左金之所以得名也此又法之巧者然猶未也一服之後繼用六味地黃加柴胡芍藥服之以滋腎水憚水能生木此處又要生木前後顛倒如此倘生木而心火又旺銷鑠肺金左金又無用矣其意專為要用六味而鬱證六味斷斷難下所以立出生木一法來則六味又為必用之方作偽心勞亦可憐也逍遙散者風以散之也地黃飲子者雨以潤之也木有不得其天者乎此法一立木火之郁既舒木不克脾土且土亦滋潤無燥熇之病金水自相生予謂一法可通五法者如此必牽連說下方可一法代五法否則又要立一方矣豈惟是哉推之大之千之萬之其益無窮凡寒熱往來似瘧非瘧惡寒惡熱嘔吐吞酸嘈雜胸痛胠脅痛小腹脹悶頭暈盜汗黃疸瘟疫疝氣飧泄等證皆對證之方也一法可代諸雜病法推而至於傷風傷寒傷濕除直中凡外感者俱作郁看一法可代傷寒諸法余所謂不但一法可代五法凡天下萬病萬法俱可代者誠然哉誠然哉嗟乎古人治病不但病名之異者各有治法即一病之中亦千頭萬緒種種各別乃竟以一方了之真喪心病狂之人也以逍遙散加減出入無不獲效如小柴胡湯四逆散羌活湯大同小異然不若此方之響應也神而明之變而通之存乎人耳所謂神明變通者總用六味也倘一服即愈少頃即發或半日或一日又發發之愈頻愈甚此必屬下寒上熱之假證郁病本無此等似熱實寒之證其所以又轉此語者專為要用八味也此方不宜復投當改用溫補之劑如陽虛以四君子湯中加溫熱藥陰虛者則以六味湯中加溫熱藥甚者尤須寒因熱用少以冷藥從之用熱藥冷探之法不則拒格不入非惟無益而反害之病有微甚治有逆從玄機之士不須予贅古方逍遙散柴胡薄荷當歸芍藥陳皮甘草白朮茯神呂氏曰六味加柴芍亦立齋法也合逍遙散謂腎肝同治但立齋去芍藥趙氏單用芍藥為不同二方同用萬無此理薛氏本庸醫之首經此二人一表章尤誤之無盡也呂氏又曰以加味逍遙散六味丸治郁自薛長洲始也邪說之宗然長洲之法實得之丹溪越鞠之芎藭即逍遙之歸芍也越鞠之蒼朮即逍遙之白朮也越鞠之神麯即逍遙之陳皮也越鞠之香附即逍遙之柴胡也越鞠之梔子即逍遙之加味也但越鞠峻而逍遙則和矣越鞠燥而逍遙則潤矣此則青出於藍後來居上亦從古作述之大凡如東垣之補中益氣比枳朮萬全無弊矣然豈可謂枳朮之謬而禁不用哉此段議論不但明末庸醫之技量盡見而呂氏之分毫不曉亦和盤拓出矣古人治病一病有一病之方一方有一方之藥一藥有一藥之性一藥增損方名即別七情六淫各有專治譬如父子夫婦有天生者有配合者分毫不可假借肉桂不容易以附子黃連何得以易石膏此醫道之所以難也今云此藥即可當某藥倘有人曰某人即我之父也某人即我之夫也人盡以為亂倫矣為此說者於古人治病之法立方之義用藥之妙何嘗夢見哉
