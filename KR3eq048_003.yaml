body:
  text: 卷下論血證六淫中雖俱能病血其中獨寒氣致病者居多寒氣致病亦間有之偏要以此為主是何肺腸何也蓋寒傷榮風傷衛自然之理又太陽寒水少陰腎水俱易以感寒一有所感皮毛先入肺主皮毛水冷金寒肺經先受血亦水也故經中之水與血一得寒氣皆凝滯而不行咳嗽帶痰而出問其人必惡寒切其脈必緊視其血中間必有或紫或黑數點此皆寒淫之驗也以上數證熱極之病何嘗無之一誤則立斃矣醫者不詳審其證便以為陰虛火動而概用滋陰降火之劑病日深而死日迫矣余嘗用麻黃桂枝湯而愈者數人皆一服微汗而愈蓋汗與血一物也奪血者無汗奪汗者無血此二語出靈樞營衛生會論專為汗血一類故脫血之人不可再發其汗汗多之人不可再去其血乃反引為脫血者必要出汗之證其顛倒至於此極而呂氏偏以至理二字贊之癡人說夢深信不疑真可憐也余讀蘭室祕藏而得此意因備記以廣其傳麻黃桂枝湯人參麥冬桂枝當歸甘草黃耆白芍五味子此方出東垣蘭室祕藏治吐血門寒鬱為火而得吐血證者仍從表散原有此理但亦須有先後次序即使一方之中欲兼顧本原亦須擇其兩不相礙古人曾有合用者用之始不害制方之義乃散者斂者寒者熱者上者下者輕者重者表者里者燥者潤者一齊並用將使此劑何所適從哉蓋藥味既亂生人固難殺人亦不易服之人或不至於死而竟愈亦間有之但古聖立方原有定法最為嚴謹至唐人專重藥性規矩略寬然古法仍不甚失至宋末猶有存者自東垣出而法度乃遂蕩然特功夫頗深自成一家推崇已久有言不信惟願天下後世將內經及金匱傷寒等書沉潛參究有得於心自能明辨其是非也客曰吐血可用辛熱為扶陽抑陰始聞命矣然復有真陰真陽之說可得聞乎曰世之言陰陽氣血盡之矣誰則云然豈知火為陽氣之根水為陰血之根乎陰陽屬二氣水火屬五行豈有二氣反根五行者吾所謂水火又非心腎之謂人身五行之外另有一無形之火無形之水流行於五臟六腑之間陰陽二氣內經言之不一謂之氣自然無形謂之水火則有形矣乃又云無形之水火故作玄妙之談以欺世其實只見其支離耳惟其無形故人莫知試觀之天日為火之精故氣隨之月為水之精故潮隨之日月未嘗無形如星家看五行者必以太陽太陰為主然此無形之水火又有一太極為之主宰將辛熱之藥補太極恐尚遠涉則又微乎微矣此天地之正氣而人得以生者是立命之門謂之元神無形之火謂之元氣無形之水謂之元精寄於兩腎中間故曰誰如此亂道五臟之中惟腎為真餘臟皆假有是理乎此真水真火真陰真陽之說也又問曰真陰真陽與血何干乎曰子但知血之為血而不知血之為水也人身涕唾津液痰汗便溺皆水也獨血之水隨火而行故其色獨紅腎中之真水乾則真火炎血亦隨火而沸騰腎中之真火衰則真水盛血亦無附而泛上從未聞有真水盛而得病者火無附而升理之所有水亦無附而升非笑談乎水之為物何必有附也惟水火奠其位而氣血各順布焉故以真陰真陽為要也薛立齊遇張東谷談命時出中庭吐血一二口云久有此證遇勞即發余意此勞傷肺氣其血必散視之果然與補中益氣湯加門冬五味山藥熟地茯神遠志服之而愈呂氏云此證今人必混入歸脾矣看古人分明不苟處勞傷肺氣吐血用歸脾湯間或有之但斷斷不用補中益氣耳況補中益氣湯中門冬五味熟地與升柴同用惟薛氏效法東垣者有之於古人制方之義全失謬種流傳至趙氏等而極真堪痛心者也或云既如此不通何以服之有效蓋制方與選藥原屬二道苟其藥不盡與病相反一味合宜即有小效但藥是而不成方或不能速愈或不能全愈或愈而有弊耳非謂制方無法人參竟不補附子竟不熱也惟急證危證大證奇證緊要關頭而制方有乖則徒有害而無益學者豈可因其有小效而遂奉為章程耶且安知無陰受其害而不覺者亦安知無明受其害而諱言者論八味丸八味丸治命門火衰不能生土致脾胃虛寒飲食少思大便不實下元衰憊臍腹疼痛夜多漩溺等證熟地山藥山萸丹皮茯苓澤瀉肉桂附子按八味載於仲景金匱要略中凡五見一見於第五篇云治腳氣上入少腹不仁再見於第六篇云虛勞腹痛少腹拘急小便不利者八味腎氣丸主之三見於第十二篇云夫短氣有微飲當從小便去之腎氣丸主之四見於第十三篇云男子消渴小便反多飲一斗小便亦一斗腎氣丸主之五見於第草二篇云婦人轉胞不得溺但利小便則愈腎氣丸主之觀此五條皆瀉少腹膀胱寒濕之疾為多蓋腎者水臟凡水病皆歸之故用茯苓澤瀉山藥等利水之藥而腎虛惡燥故又用熟地萸肉等滋斂之藥又水為寒邪故用附桂等助陽通痹之藥相濟而相成總以通腎氣利小便為主此八味之正義也孰知趙氏竟以之為補先天真火並能補太極之方不但仲景之所不料即自古造方者亦不料也又按古法只有乾地黃生地黃並無熟地黃熟地黃乃後人製法以之入滋補下焦藥中頗為得宜若入湯劑及涼血等藥甚屬不合蓋地黃專取其性涼滑利熟則膩滯不能流行矣況外感未消痰火未除一概用熟地為害尤甚加減不依易老亦不效今人有加人參者人參乃是脾經藥到不得腎經人參不可加柴胡獨可加乎有加黃柏知母者有欲減澤瀉者皆不知立方本意也加知柏不知立方之本意加柴胡獨知立方之本意乎水火論坎乾水也氣也即小而井大而海也兌坤水也形也即微而露大而雨也井海之水為氣雨露之水為形成何說話一陽陷於二陰為坎坎以水氣潛行地中坎為水何以云坎以水氣為萬物受命根本故曰潤萬物者莫潤乎水一陰上徹於二陽為兌兌以有形之水普施於萬物之上兌澤也如何普施萬物之上為資生之利澤故曰說萬物者莫說乎澤明此二水可以悟治火之道矣心火者有形之火也相火者無形之火也無形之火內燥熱而津液枯然則命門之真火害人如是耶以五行有形之兌水制之者權也兌水是身中何物如何是制之之法吾身自有上池真水氣也無形者也以無形之水沃無形之火無形之水又是身中何物如何是沃之之法一味胡言即彼亦不能自解也常而可久者也是為真水真火升降既宜而水火既濟矣醫家不悟先天太極之真體又說到太極更渺茫矣不窮無形水火之妙用而不能用六味八味之神劑者其於醫理尚缺大半上文說乾說坤說坎說兌以及有形無形真水真火太極真體何等廣大淵微不知有何等出神入化之治法乃竟不過六味八味二方而八卦太極之道已無不貫串通天徹地學問只要記此二方足矣豈非夢境六味丸說六味丸治腎虛作渴小便淋祕氣壅痰涎頭目眩暈眼花耳聾咽燥舌痛腰腿痿軟等證及腎虛發熱自汗盜汗便血諸血失音水泛為痰之聖藥水泛為痰是濕在上焦矣豈熟地萸肉所能治血虛發熱之神劑又治腎陰虛弱津液不降敗濁為痰豈酸濕所宜或致咳逆萸肉熟地亦非治咳之藥將痰火補住永成勞怯矣又治小便不禁收精氣之虛脫為養氣滋腎制火導水使機關利而脾土健實熟地萸肉豈健脾之品熟地萸肉山藥丹皮茯苓澤瀉地黃山藥澤瀉皆潤物也此方所補之水無形之水六味有形之藥何以能補無形之物愈說得高妙愈淺陋矣物之潤者亦無形此又亂道之至者何以物之潤者皆無形然則天下有形之物皆極燥者耶故用之呂氏曰明薛新甫治陰虛火動用丹溪補陰法不驗者以六味代之立應自此以來為補陰之神方矣趙氏得力於薛氏醫案而益闡其義觸處旁通外邪雜病無不貫攝外邪雜病一方治盡稍有知識者決不為此言而六味之用始盡然趙氏加減之法甚嚴又稍異於薛氏高鼓峰嘗詳論兩家加減之法而附以己意呂氏之學實得之高鼓峰高鼓峰則首宗趙氏之人也呂氏因信高之故而信趙天下之人又因信呂氏選時文講性理之故而並信其醫且只記兩方可治盡天下之病愚夫又甚樂從貽害遂至於此極所以罪首禍魁高不能辭而承流揚波呂之造孽更無窮世所刻鼓峰心法高呂醫案等書一派相承辨之不勝其辨知趙氏之謬則余者自能知之矣以授其門人甚辨今述之下六味丸薛氏一變而為滋腎生肝飲用六味減半分兩而加柴胡白朮當歸五味合逍遙而去白芍藥加五味合都氣意也柴胡白朮自是二藥何以見得必定是逍遙都氣中來而云合也以生肝故去芍藥而留白朮甘草以補脾六味方中何以容得補脾藥補脾者生金而制木也以製為生相生之法別是一義不得如此講若云白朮補脾生金而制木遠隔幾臟則六味補腎即便生肝奈何奈何天地自然之序也又一變而為人參補氣湯其義愈變化無窮真游龍戲海之妙去澤瀉而加參耆朮歸陳皮甘草五味門冬參耆術陳又如何得合六味夫白朮之與六味其化相反焉得合之曰從合生脈來生脈中無白朮且何以知其必從此來耶則有自然相通之義借茯苓以合五味異功之妙止一茯苓何以即是異功用當歸黃耆以合養血之奇其不用澤瀉者蓋為發熱作渴小便不調則無再竭之理理無則竭便當急生云生脈則非生小便也生脈之所由來既當生脈異功之可以轉入也且水生高原氣化能出肺氣將敗故作渴不調此所以急去澤瀉而生金滋水復崇土以生金其苦心可不知哉枉勞苦心又一變而為加味地黃丸又名抑陰地黃丸陰如何放肆而必欲抑之加生地柴胡五味復等其分愈出愈奇矣柴胡從逍遙散生地從固本來五味仍合都氣一方自是一方一藥自是一藥除兩方合併名曰偶方之外絶無可以牽連之道乃必指方中某藥從某方來則六味之中熟地從何方來萸肉從何方來耶其曰耳內癢痛或眼昏痰喘或熱渴便澀而總為肝腎陰虛則知其陰虛半由火鬱而致也柴胡以疏之鬱火非生地不能涼用五味仍瀉丁以補金補金以生水也曰抑陰非疏不可疏之所以抑之生地涼血便有瀉義瀉之所以抑之也生地又是瀉陰之藥非但前後背謬更是千古怪談又一變而為九味地黃丸以赤茯苓換白茯苓加川楝子當歸使君子川芎此更怪之怪者使君子治小兒疳蟲疳蟲俱在腸胃之中若同六味入腎將疳蟲已入腎耶又川芎乃升提之品將提六味於何處耶抑欲令川芎亦入腎也盡是直瀉厥陰風木之藥仍是肝腎同治之法緣諸疳必有蟲皆風木之所化肝有可伐之理但伐其子則傷其母故用六味以補其母去澤瀉者腎不宜再泄也趙氏則以為六味加減法須嚴其善用六味雖薛氏啓其悟端而以上變化概未透其根底故盡廢而不能用見其能合當歸柴胡而去芍藥則反用芍藥為疏肝益腎此則其聰明也乃謂白朮與六味水土相反人參脾藥不入腎此二句乃趙氏一隙之明但不知柴胡又何以可合六味耳其論亦高簡嚴密然細參薛氏畢竟趙氏拘淺薛氏諸變法似乎寬活然其實嚴密學者當善悟其妙薛氏諸加減法昏憒已極趙氏之不盡從之亦非必能知其謬也其意蓋以為六味一方不必多用加減之法而已無病不治耳然其以薛之加減為未當不可謂其無一隙之明乃呂氏又不以為然而轉崇薛氏則其昏憒更甚於趙矣古人制方之法有上下大小燥濕寒熱緩急補瀉內外升降氣血陰陽輕重奇偶種種不同絲毫不可假借其間亦有並用之法然必其經絡相通雖相反而實相濟又必先聖方中曾有合用者乃可加入否則即為杜撰其云從某方某方來更屬可笑夫一藥乃萬方所共安見此味必根於某方如有人作文自注云此也字從某書來此者字從某文來豈不令人噴飯耶呂氏述其說而稱之我不慨薛氏而慨呂氏矣而以意通之大旨以肝腎為主而旁救脾肺則安頓君相二火不必提起而自然帖伏矣亂道一篇到底是說何病糊塗至此其心殆如糞土矣八味丸說君子觀象於坎而知腎中具有水火之道焉夫一陽居於二陰為坎此人生與天地相似也今人入房盛而陽事易舉者陰虛火動也陽事先痿者命門火衰也真水竭則隆冬不寒真火息則盛夏不熱素問調經論云陽虛則外寒陰盛則內熱陽盛生外熱陰盛生內寒蓋陰陽或偏則畏寒畏熱此之謂病若隆冬不寒盛夏不熱則是陰陽充足之候去天神不遠矣豈反是真水真火已竭為將死之人乎是方也熟地山萸丹皮澤瀉山藥茯苓皆濡潤之品澤瀉茯苓丹皮俱不得為潤藥所以能壯水之主肉桂附子辛潤之物能於水中補火所以益火之原水火得其養則腎氣復其天矣益火之原以消陰翳即此方也蓋益脾胃熟地萸肉並不能益脾胃而培萬物之母其利溥矣相火龍雷論火有人火有相火人火者所謂燎原之火也遇草而焫得木而燔可以濕伏可以水滅可以直折黃連之屬可以制之相火者龍火也雷火也得濕則焫遇水則燔不知其性而以水折之以濕攻之適足以光焰燭天物窮方止矣識其性者以火逐之則焰灼自消炎光撲滅今人率以黃柏治相火是水滅濕伏龍雷之火愈發矣龍雷之火每當濃陰驟雨之時火焰愈熾或燒燬房屋或擊碎木石其勢誠不可抗惟太陽一照火自消滅此得水則熾得火則滅之一驗也桂附引火歸原引之下達耳是補龍雷之火非滅之也不顧文理專以大言以惑愚人耳陰虛發熱論世間發熱類傷寒者數種至於勞心好色內傷真陰真陰既傷則陽無所附故亦發熱其人必面赤煩躁口渴引飲骨痛脈數而大或尺數而無力者是也惟丹溪發明補陰之說以四物湯加黃柏知母此用血藥以補血之不足者也世襲相因屢用不效何耶蓋因陰字認不真誤以血為陰耳當作腎中之真陰即先天也內經曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也王太僕先生注云大寒而盛熱之不熱是無火也大熱而盛寒之不寒是無水也又云倏忽往來時發時止是無火也晝見夜伏夜見晝止時節而動是無水也當求其屬而主之無火者宜益火之原以消陰翳無水者宜壯水之主以鎮陽光必須六味八味二丸出入增減以補真陰此又自造王太僕語而誤者諸寒之五句出素問至真要大論王注云益火之源以消陰翳壯水之主以制陽光故曰求其屬也只此五句是原文余俱增出者注之意蓋謂熱病以寒藥治其熱熱宜自退乃熱仍在此不可以驅當於陰分增益其水以配火則陰盛而陽自伏不用瀉而用補所謂壯水之主也寒病以熱藥治其寒寒自宜已乃寒仍在此不可以驅當於陽分增益其火以配水則陽旺而陰自衰亦不用瀉而用補所謂益火之源也何等明白下文即接云但益心之陽寒亦通行強腎之陰熱之猶可明指心為陽腎為陰即經文司天運氣以心為火腎為水之說並不指腎中之陰陽也專指腎言已屬不倫又造出無數亂道且接出必須六味八味丸一句似亦是王太僕之言何等荒唐自此說行人竟以益火之源二句鑿鑿指腎經言而六味八味真王太僕以來不易之神方矣嗚呼豈不冤哉屢用屢效若有産後及大失血後陰血暴傷必大發熱亦名陰虛發熱此陰字正謂氣血之陰若以涼藥正治立死正所謂象白虎湯證誤服白虎湯必死當此之時偏不用四物湯有形之血不能速化幾希之氣所宜急固須用獨參湯或當歸補血湯使無形生出有形來血脫氣亦脫故急固其氣不使脫盡乃可用大補之劑非始終用參亦非一用參而不必服藥也若云生出非但緩不及事且全失用參之義矣此陽生陰長之妙用不可不知也或問曰子之論則詳矣氣虛血虛均是內傷何以辨之豫曰悉乎子之問也蓋陰虛者面必赤無根之火戴於上也若是陽證火入於內面必不赤實熱之證陽明火旺面固赤腎火上浮面亦赤何雲陽證無面赤者其口渴者腎水乾枯引水自救也陽明證口渴最甚但口雖渴而舌必滑脈雖數而尺必無力甚者尺雖洪數而按之必不鼓此為辨耳雖然若問其人曾服過涼藥脈亦有力而鼓指矣戴復庵云服涼藥而脈反加數者火鬱也宜升虛人敗證總無升法云宜溫則得矣宜補切忌寒涼犯之必死臨證更宜詳辨毫釐之差枉人性命慎哉咳嗽論外感風寒而咳嗽者今人率以麻黃枳殼紫蘇之類發散表邪謂從表而入者自表而出如果系形氣病氣俱實者一汗而愈若形氣病氣稍虛者宜以補脾為主治嗽正與補脾相反安見有外感咳嗽而用耆術等藥者而佐以解表之藥補脾中如何容得解表之藥宜立方之盡不通也何以故蓋肺主皮毛惟其虛也故腠理不密風邪易以入之若肺不虛邪何從而入耶然則竟不必問其何因一概大補可耶古人所以制參蘇飲中必有參人參本不為補脾而設且感證亦非盡用參蘇飲也桂枝湯中有芍藥甘草解表中兼實脾也芍藥甘草並非為補脾而設傷寒諸家注甚明且桂枝亦非治嗽方也脾實則肺金有養皮毛有衛已入之邪易以出邪已在內而補之則補邪矣世有賊未去而堅築牆垣以為如此則賊易去者非至愚乎當改云已入之邪終身不出後來之邪無自而入矣若專以解表則肺氣益虛腠理益疏外邪乘間而來者何時而已耶須以人參黃耆甘草以補脾兼桂枝以驅邪此亦非咳嗽所宜用之品此豫謂不治肺而治脾虛則補其母之義也此句不如此解蓋此乃隔二隔三之治以治臟邪久病則然若感冒乃風火之疾能待臟氣相生耶仁齊直指云肺出氣也腎納氣也肺為氣之主腎為氣之本凡咳嗽暴重動引百骸自覺氣從臍下逆奔而上者此腎虛不能收氣歸元當以地黃丸安腎丸主之此亦當問其有邪無邪毋徒從事於肺此虛則補子之義也補子未知何出余又有說焉五行之間惟肺腎二臟母盛而子宮受邪何以獨此二臟為然且盛則何以反受邪何則肺主氣肺有熱則氣得熱而上蒸不能下生於腎而腎受邪矣不生則僅不生而已邪從何來腎既受邪則肺益病此又何也蓋母藏子宮子隱母胎凡人肺金之氣夜臥則歸藏於腎水之中今因肺受心火之邪又增出心火來欲下避水中而腎水乾枯有火何以腎又有火無可容之地於是復上而病矣是肺自病耶是邪病耶若是肺病肺氣歸肺不得為病若是邪病則爾必欲肺之邪藏於腎而後為不病乎吐血論問吐血多起於咳嗽咳嗽血者肺病也方家多以止嗽藥治肺兼治血而不效何也曰諸書雖分咳血嗽血出於肺咯血唾血出於腎余謂咳嗽咯唾皆出腎蓋腎脈入肺循喉嚨挾舌本其支者從肺出絡心注胸中故二臟相連病則俱病而其根在腎吐血五臟皆有獨肺為多偏要說皆腎病無肺病講論病源為濟世而設每語必與古人相戾誠何心也謂腎病必關於肺則可下焦之血必由咳吐出也謂肺病必關於腎則不可上焦之血不必從腰膂過也其所以專指為腎者不過獨欲用六味八味嗟呼六味八味兩藥方耳不知與趙氏何恩每病非此不治即使與此病毫無干涉必先將此病牽到腎經然後用此二方其或斷斷不可牽者則以真陰真陽太極概之夫陰陽太極則處處可假借者於是二方不可須臾離矣故吾謂醫貫者亡明之妖書也褚氏遺書津液論云天地定位水位乎中人肖天地亦有水焉在上為痰在下為水遺書云在下為精今改為水與上文亦有水焉句如何接上伏皮為血從毛竅中出為汗可見痰也水也血也一物也此又失褚氏之意者褚氏明人身上下皆有水並非謂四者即一物也其動輒誣古人如此血之帶痰而出者乃腎水挾相火炎上也既是一物則指為痰帶痰而出亦可耶惟六味地黃丸獨補腎水如有咳嗽等疾及肺氣未清者亦禁用無此等則未嘗不可用也性不寒涼不損脾胃久服則水升火降而愈又須用人參救肺肺氣上逆咳嗽者禁用補胃藥收功使金能生水蓋滋其上原也喘論經云諸喘皆屬於上又云諸逆衝上皆屬於火故河間敘喘病在於熱條下華他云肺氣盛為喘活人書云氣有餘則喘後世集證類方不過遵此而已獨王海藏辨云氣盛當作氣衰有餘當認作不足肺氣果盛與有餘則清肅下行豈復為喘以其火入於肺炎爍真陰衰與不足而為喘焉盛衰二字誤解不得經云邪氣盛則實精氣奪則虛故凡言盛者皆指邪氣凡言虛者皆指精氣凡盛虛有二種有外感及別臟之氣來乘而盛者有本經之氣血結聚而盛者有外感及別臟之邪消伐而虛者有本經之氣血衰少而虛者病情不同治法亦異嗟乎盛衰二字極淺極易而醫者聚訟紛紜千古夢夢可勝長嘆所言盛與有餘者非肺之氣也肺中之火也此何勞辨即如腎有餘豈指精多肝有餘豈指血多耶至言肺中之火又屬一偏六淫之氣皆為有餘何但火哉海藏之辨超出前人發千古之精奧惜乎起其端未竟其火之所由來愚謂火之有餘水之不足也此專為要用六味然外來之火不必盡水之不足也陽之有餘陰之不足也凡諸逆衝上之火皆下焦衝任相火出於肝腎者也故曰沖逆腎水虛衰相火偏勝壯火食氣銷爍肺金烏得而不喘焉內經云腎者主水主臥與喘也喘何嘗不屬腎舍此明證反引支離之說愈無頭腦但喘雖屬腎而因各不同治法亦異非六味一方所能盡耳須用六味地黃加門冬五味大劑煎飲以壯水之主如上焦未清痰涎湧結服此非惟不能下達且氣逆涎升終無愈期矣則水升火降而喘自定矣蓋緣陰水虛故有火有火則有痰有痰則咳嗽咳嗽之甚則喘凡謂喘證只此陰虛一病六味一方豈不孟波當與前陰虛相火論參看喉咽痛論喉與咽乃一身之緊關橐籥也經曰足少陰所生病者口渴舌乾咽腫上氣嗌乾及痛素問云邪客於足少陰之絡令人咽痛不可納食又曰足少陰之絡循喉嚨通舌本凡喉痛者皆少陰之病此又亂道靈素手足太陰足厥陰少陽足陽明手少陽少陰諸經皆有喉咽之證令皆抹殺專指為腎經之疾然後可獨用六味八味真苦心也但有寒熱虛實之分少陰之火如奔馬逆衝到咽喉緊鎖處氣鬱結而不得舒故或腫或痛也其證必內熱口乾面赤痰涎湧上其尺脈必數而無力蓋緣腎水虧損亦有實火者相火無制而然須用六味地黃門冬五味大劑作湯服之喉痛之挾風火者十居八九即以滋膩酸斂之藥投之百不一生如辛酉壬戌之間咽喉痛者十人而五不但服溫燥之藥者立斃即清涼之藥而少加重濁者尚且不救余治以百數皆以辛寒清淡疏散之藥不失一人若依此方無一活者矣又有色欲過度元陽虧損無根之火遊行無制客於咽喉者須八味腎氣丸若遇陽明有火者不立斃乎大劑煎湯冰冷與飲使引火歸原庶幾可救此論陰虛咽痛治法如此正褚氏所謂上病療下也人之喉咽如曲突曲突火炎若以水自上灌下突暴裂矣如曲突之火已熾炎及屋宇安得不以水沃乎惟灶床下以盆水映之上炎即息此上病療下之一驗也有急喉痹者其聲如齁痰如拽鋸此為肺絶之候此乃氣上脫之證宜入類中風條非急喉痹急喉痹乃風火之證耳不得誤引且果系喉痹人參薑汁豈不立殆者速宜人參膏用薑汁竹瀝放開服如未得膏先煎獨參湯救之服早十全七八次則十全四五遲則不救眼目論經曰五臟六腑之精皆上注於目而為之精腎藏精故治目者以腎為主明明說為之精則即眼之精矣明明說五臟六腑之精則五臟六腑各有精矣若指腎藏精之精即是此精將目中之脂膏盡在腎中耶目雖肝之竅子母相生腎肝同一治也並肝腎為一總要專用六味一方耳又有陽虛不能抗陰者若因飲食失節勞役過度脾胃虛弱下陷於腎肝濁陰不能下降清陽不能上升天明則日月不明邪害空竅令人耳目不明夫五臟六腑之精皆稟受於脾土而上貫於目此精字乃飲食所化之精非天一之元精也內經明云五臟六腑之精皆上注於目而為之精又曰目者五臟六腑之精也榮衛魂魄之所常營也神氣之所生也其鑿鑿如此偏要說是脾土飲食所化之精反經背道已極至稟受脾土二句又是假造經文用東垣益氣聰明湯張子和云目不因火則不病白輪病赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與脾也赤脈貫目火自甚也能治火者一句可了亦一偏之見六淫之邪皆能傷目也但子和一味寒涼治火余獨補水以配火亦一句可了若系邪火豈補水所能化至於六淫七情錯雜諸證詳倪仲賢原機啓微此書甚好而薛立齊又為之參補深明壯水之主益火之原甚有益於治目者也若系六淫則壯水之六味益火之八味何可用耶口瘡論口瘡上焦實熱中焦虛寒下焦陰火中焦何以必定虛寒豈無脾胃實火者下焦何以必定陰火豈無虛寒而逼陽於上者各經傳變所致當分別而治之如發熱作渴飲冷此實熱也輕則用補中益氣實熱反用升補重則用六君子湯實熱而至發熱作渴反用參朮橘半是何肺腸飲食少思大便不實此中氣虛也亦有邪火作瀉者用人參理中湯大熱大補之藥用於口瘡之證其不變為危險者亦鮮矣手足逆冷肚腹作痛此中氣虛寒用附子理中湯此是口瘡兼證或是口瘡本證兼證者因口瘡誤治釀成此等敗證也本證者本有虛寒之證逼火而成瘡也此則不治瘡而治本不可以此為治口瘡之方也且口瘡治法多端豈寒熱虛實四字所能盡晡熱內熱不時而熱此血虛也用八物加丹皮五味麥冬發熱豈宜用五味發熱作渴唾痰小便頻數此腎水虛也用八味丸作渴吐痰何得用八味且小便數亦不盡屬虛寒也日晡發熱或從少腹起陰虛也用四物參朮五味麥冬不應用加減八味丸口瘡而日晡發熱則屬陽明矣以上兩方皆不合且四物湯加入參術雜亂無章非治口瘡之法又不應而忽改作八味丸則是以人試藥矣按不應二字出之薛氏醫案薛氏治病每云某病余投某藥不應又改某藥又不應乃曰然則非此病矣又換某藥數十劑而愈如此極多明明是以藥試病矣幸而天命未絶能待換方而愈豈無不應之時不及換方而死且再換一方仍不應而致死者豈少哉蓋能鑿鑿審為何病猶恐藥力不至不能有功況全然相反以藥試之耶醫案俚鄙庸陋遊移恍惚至薛而極後人猶奉為模範何愚之甚也或問虛寒何以能生口瘡而反用附子理中耶蓋因胃虛谷少則所勝者腎水之氣寒亦何必腎水之氣或因他臟或因本臟上盛則下虛上熱則下寒無一定也逆而承之反為寒中脾胃衰虛之火被迫炎上作為口瘡經曰歲金不及炎火乃行復則寒雨暴至陰厥乃格陽反上行民病口瘡是也故用參朮甘草補其土薑附散其寒既成瘡則火已凝結不先散解降納而惟峻補助火安有不危者乎則火得所助接引而退舍矣消渴論消渴之疾余有一說焉人之水火得其平氣血得其養何消之有其間攝養失宜水火偏勝津液枯槁以致龍雷之火上炎熬煎既久腸胃合消五臟乾燥令人四肢瘦削精神倦怠故治消之法無分上中下先治腎為急內經云心移熱於肺傳為鬲消大腸移熱於胃善食而瘦謂之食㑊則上中二消明明是心與大腸之火與腎無干反盡從腎治耶況腎火上衝之證往往不甚渴即渴亦不能多飲蓋腎中之火既上則下焦之陽衰陽衰則陰盛水為陰屬故不能多飲也幾辨陰火實火之法俱視此奈何欲用二方遂不及詳察耶惟六味八味及加減八味丸隨證而服降其心火滋其腎水則渴自止矣或問曰下消無水用六味丸以滋少陰腎水矣又加附子肉桂者何蓋因命門火衰不能蒸腐水穀水穀之氣不能薰蒸上潤乎肺如釜底無薪鍋蓋乾燥故渴至於肺亦無所稟不能四布水精並行五經其所飲之水未經火化直入膀胱正謂飲一升溺一升飲一斗溺一斗此是下消之證與肺又無涉試嘗其味甘而不咸可知矣故用桂附之辛熱壯其少陰之火灶底加薪枯籠蒸溽槁禾得雨生意維新惟明者知之昧者鮮不以為迂也昔漢武帝病渴張仲景為處此方仲景是漢獻帝時人與武帝相去二百餘年明明可考乃造出此語何耶趙氏所談無往非夢而此則又夢之最不經者至聖玄關今猶可想八味丸誠良方也瘡疽痊後及將痊口渴甚者舌黃堅硬者及未患先渴或心煩躁渴小便頻數或白濁陰痿飲食少思肌膚消瘦及腿腫腳軟口齒生瘡服之無不效經云諸痛癢瘡皆屬於火又云水液渾濁皆屬於熱況經大泄膿血之後陰血大傷作渴煩躁孤陽欲越乃反以辛熱逐水之藥速之死仇何深也氣虛中滿論中滿者證與鼓脹水腫無異何故屬之氣虛請得明言之否曰氣虛者腎中之火氣虛也如此該腎自病矣中滿者中空似鼓虛滿而非實滿也大略皆脾腎兩虛所致故治腫者先以脾土為主須補中益氣湯或六君子湯溫補之水未去而補之則補其水也俾脾土旺則能散精於肺通調水道下輸膀胱水精四布五經並行矣或者疑謂喘脹水滿而又加純補之劑恐益脹滿必須補藥中加行氣利水之品方妙此說深似得病情終非大方家體治病而講體統無恥已甚蓋肺氣既虛不可復行其氣腎水已衰不可復利其水利邪水正所以衛正水猶之驅邪氣正所以保正氣豈並腎精而亦利之耶純補之劑初時似覺不快過時藥力得行漸有條理矣至於補腎以治腫其說難明蓋禹之治水行其所無事也若一事疏鑿則失之矣當時禹亦何嘗不浚川鑿河哉據爾云必須補腎則禹當日只曰益水之源可矣今人之治腎水者牽牛大戟粗工之小智正禹之所惡也間有用五苓五皮者以為中正亦轉利轉虛腎氣愈衰而愈不能推送矣故須用補腎經曰腎開竅於二陰腎氣化則二陰通二陰閉則胃䐜脹故曰腎者胃之關關門不利故水聚而從其類也可知要利關門不是要補關門也引來卻正與爾相左又曰腎主下焦三焦者決瀆之官水道出焉可知以決瀆為主膀胱者州都之官津液藏焉必待三焦之火化始能出也改內經文氣化二字為火化意在八味也孰知換此一字其弊遂百出乎經曰三焦病者氣滿小腹光堅不得小便溢則水留而為脹曰溢曰水留尚專於用補耶惟張仲景制金匱腎氣丸補而不滯通而不泄誠治腫之神方薛立齊屢用屢效詳載醫案余依其案試之甚驗故詳著焉世有患此幸無誕之乎金匱腎氣丸白茯苓附子牛膝肉桂澤瀉車前子山藥山萸丹皮熟地中滿之病原於腎中之火氣虛不能行水此方內八味丸為主以補腎中之火八味為利水之劑說見前山藥茯苓澤瀉俱制土驅濕之藥而水為陰類故以附子溫之肉桂通之惟生地萸肉為能滋潤以保腎陰然初起猶不即用須略加通利之後始用之而效此仲景制方之義也知腎氣丸為治水之藥即可知非全補真陽太極之藥若以此方治盡天下之病則是舉天下之病皆以治水腫之法治之矣思之能不自笑哉則三焦有所稟命浩然之氣塞乎天地不必作如此大帽子腎氣不虛而能行水矣內有附子肉桂辛熱之品熱則流通又火能生土土實而能制水矣又有牛膝車前二味最為切當方見金匱要略故名金匱腎氣丸金匱並無車前牛膝乃後人所加亦後人所名也又有一等純是陰虛者下一純字專為要用六味而病情又失矣其證腹大臍腫腰痛兩足先腫小水短澀喘嗽有痰不得臥甚至頭面皆腫或面赤口渴但其人飲食知味大便反燥醫見形腫氣喘水證標本之疾雜用利水之藥而益甚不知陰虛三焦之火旺與衝脈之屬火者同逆而上由是水從火溢水火不能相合豈有水反從火溢者即有之亦宜引火達下不得用純陰藥也上積於肺而嗽甚則為喘呼不能臥散聚於陰絡而為跗腫隨五臟之虛者入而聚之為五臟之脹皆相火泛濫其水而生病也五臟之脹皆屬於火從無此論腫脹用八味固是正治用六味則無此理矣蓋水勢橫逆得純陰之品則陰氣益旺且無辛芳之藥則水道必不能開但或遇陰虛之人則用藥忌太燥熱耳此人治病六味八味不可缺一此論用八味而遺六味則真陰又無著落所以幻出陰虛一種則六味仍不可缺六味有知亦感此周旋之德否以六味地黃加麥冬五味大劑服之滋之不足尚欲斂之不殺不休親試有驗故録噎膈論內經曰三陽結謂之膈三陽者大腸小腸膀胱也太陽為三陽陽明為二陽少陽為一陽此處三陽舊注指手太陽小腸足太陽膀胱言乃增出大腸末蓋誤以三陽為三陽經也結結熱也大腸主津小腸主液大腸熱結則津涸小腸熱結則液燥膀胱為州都之官津液藏焉膀胱熱結則津液竭然而三陽何以致結熱皆腎之病也然則內經何以不云少陰結謂之膈蓋腎主五液又腎主大小便腎與膀胱為一臟一腑腎水既干陽火偏盛熬煎津液三陽熱結則前後閉澀下既不通必反幹上直犯清道上衝吸門喉咽所以噎食不下也何為水飲可入食物難下蓋食入於陰長氣於陽豈有食未下咽之時陽氣已長之理乎反引動胃口之火故難入水者陰類也同氣相投故可入水自然比食易下不必過高其說若胸中有痰飲者則食易下而水反難下矣口吐白沫者所飲之水沸而上騰也既同氣相投何以又沸糞如羊矢者食入者少渣滓消盡腸亦干小而不寬大也本系腸枯非因食少王太僕云食入即出是無水也食久反出是無火也無水者壯水之主無火者益火之原王太僕只有寒之不寒是無水也數語今改作治翻胃法以湊上六味八味二方我想其作僞之心不知如何詭祕也直須以六味地黃丸料大劑煎飲久服可挽於十中之一二又須絶嗜欲遠房幃薄滋味可也若曰溫胃胃本不寒何以必定無寒若曰補胃胃本不虛此則又亂道矣爾論病必曰邪之所湊其氣必虛何獨此純虛之證反曰不虛耶若曰開鬱香燥之品開鬱亦不必專用香燥適以助火局方發揮已有明訓河間劉氏下以承氣鹹寒損胃津液愈竭無如補陰此症多痰涎凝閉當補陰者絶少焰光自滅夢遺並精滑論治以腎肝為主經曰陰陽之要陽密乃固陽強不能密陰氣乃絶陰平陽祕精神乃治陰陽離決精氣乃絶夫所謂陽強者乃肝腎所寄之相火強也所謂陰絶者乃腎中所藏之真陰絶也腎為陰主藏精肝為陽主疏泄惟此處疏泄不繫肝也是故腎之陰虛則精不藏肝之陽強則火不祕明明是腎中相火偏要說是肝火凡肝火動者必上升而易怒今人每入房之時必火升而大怒耶以不祕之火加臨不藏之精有不夢夢即泄矣薛立齊專用六味地黃以補腎而治夢遺屢效縱有相火水能滋木水升而木火自息矣倘有脾胃不足濕熱下流者以前丸為主煎服補中益氣湯以升提之此又怪異之極者濕熱如何提得且既已有濕又屬脾胃亦何可用六味也論補中益氣湯補中益氣湯黃耆當歸人參炙甘草陳皮升麻柴胡白朮或問曰古今稱補中益氣湯為萬世無窮之利其義云何曰此發前人所未發繼仲景不倫河間而立意義深遠也世人一見發熱便以為外感風寒暑濕之邪非發散邪從何出又不能灼見風寒暑濕對證施治乃通用解表之劑雜然並進因致斃者多矣東垣深痛其害創立此方以為邪之所湊其氣必虛內傷者多外感者間或有之辨在前立此方以治內傷而兼外感者何等平常必雲天下竟無外感之病則亂道矣此人每舉一方必要說此方能治盡天下之病不必更用別方是何等肺腸縱有外邪亦是乘虛而入但補其中益其氣而邪自退不必攻邪將歷古治病之方一齊刪卻攻則虛者愈虛而危亡隨其後矣攻邪不是攻正何以虛者愈虛倘有外感而內傷不甚者即於本方中酌加對證之藥而外邪自退所謂仁義之師無敵於天下也仁義之師亦非竟不用兵刃也或問曰余見先生動輒以先天后天立論余考之易中先天后天之圖乾南坤北離東坎西等卦位於醫中甚無所合而先生屢言之不已其義云何曰怪乎子之問也余所謂先天者指一點無形之火氣也以火氣為先天其玄妙如此後天者指有形之體自臟腑及血肉皮膚與夫涕唾津液皆是也既曰先天此時天尚未生何況有乾南坤北八卦對待之圖乎先天在天未生之前卻不知到在人腹中專恃八味養之豈非夢境曰然則伏羲此圖何為而設也余曰此非先天之圖乃中天八卦之圖歷古無中天之圖造出此名以遷就自己亂道此等直是無人心者天位乎上地位乎下日出乎東水源乎西以水對日亦是怪論風雨在天上山雷在地下人與萬物位乎中豫嘗見誰不見邵子排列如此有先天八卦數其當今所用者止一文王后天圖誰用此出乎震齊乎巽相見乎離致役乎坤悅言乎兌戰乎乾勞乎坎成乎艮以春秋晝夜十二時相配因以定陰陽決生死推而天文地理星相醫卜無一不以此圖為則至於先天者無形可見前圖何以無形可見後天圖之有形可見在何處種種欺人胡說即易中帝出乎震之帝神也者妙萬物而為言之神是也此二句卻是文王后天圖之語又與上文先天圖說不合帝與神即豫先天要論中所稱真君真主本系無形何以反出在後天圖說內不得已而強立此名以為主宰先天之體以為流行後天之用東垣先生獨會其宗而以補中益氣方中用柴胡升麻者正以生髮先天之氣於脾土之中先天之氣前要用六味八味則云在腎中此要用補中益氣則云在脾土中況先天之氣立於天尚未生之前獨升麻柴胡足以左之右之真乾坤在手之神技也真萬世無窮之利余所以諄諄為言也若飲食失節寒溫不適脾胃乃傷喜怒憂恐損耗元氣脾胃氣衰元氣不足而火獨盛火者陰火也起於下焦元氣之賊也壯火食氣少火生氣火與元氣不兩立必要將火滅盡元氣方存豈非胡說一勝則一負脾胃氣虛則下流肝腎名曰重強何以虛則反下流且流去是何物內經重強二字亦不如此講經云脾脈太過則令人四肢不舉其不及則令人九竅不通名曰重強此乃指脾之病脈言脈病則五臟皆不和順也何嘗指下流肝腎耶陰火得乘其土位故脾證始得則氣高而喘身熱而煩脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱又雜外感之證蓋脾胃之氣下流使穀氣不得升浮是春生之令不行句句不連貫皆學舌語也則無陽以護其營衛衛即衛身之陽氣也如何反要脾胃之氣為衛遂不任風寒而生寒熱此皆脾胃之氣不足所致也傷寒發熱拂拂如羽毛之熱熱在皮毛三陽俱有壯熱之證若陽明則熱在肌膚為尤劇如何皆只微熱內傷者肌體壯熱捫之烙手內傷雖熱總不如外感之甚如何反以為極熱右手氣口脈大於左手人迎三倍此又亂道脈大三倍是關格之脈危證矣豈內傷乎其氣口脈急大而數時一代而澀代脈亦是危證安得內傷即現此脈且脈亦不可派定也澀是肺之本脈代是氣不相接乃脾胃不足之脈大是洪大洪大而數乃心脈刑肺急是弦急乃肝木挾心火克肺金也其右關脈屬脾比五脈獨大而數數中時顯一代此不甚勞役是飲食不時寒溫失所又何以鑿鑿派定如此胃脈損弱隱而不見惟內顯脾脈如此以上語語不接說內傷肺又俱說肺金受克絶無頭緒若外傷則人迎脈大於氣口也或問曰丹溪云東南之人陽氣易以升不可服補中益氣湯當今江以南之人果盡不當服乎曰東南指人之臟腑而言之何不云東南之臟不可服補中益氣湯耶然則肺腎謂之西北人矣作此語者其臟腑殆無人氣其人上盛者必下虛其腎氣大虛矣急須填補北方先天之元氣為要總而言之先天後天不得截然兩分上焦元氣不足者下陷於腎中也元氣本不在上焦即使上焦亦有元氣如何陷入腎中當取之至陰之下下焦真陰不足者飛越於上部也陰氣如何能飛越焉可不引而歸原耶引陰歸原從未前聞是以補中益氣湯與腎氣丸並用即前怪法朝服補陽暮服補陰互相培養傷飲食論大凡元氣完固之人多食不傷過時不飢若夫先因本氣不足致令飲食有傷矣克削之藥一用飲食雖消但脾既已受傷而復經此一翻消化愈虛其虛明後日食復不化猶謂前藥已效藥力缺多湯丸並進展轉相害羸瘦日增良可悲哉消化之藥原不教人長服也余痛此斃因申言之凡太平丸保和丸肥兒丸之類其名雖美俱不敢用蓋名之美者其藥必惡然則陷胸抵當等名皆大補之劑而天真大造等方皆傷生之藥耶故以美名加之以欺人耳目非大方家可用也古人立此名專為欺人而設不知古人與後世何仇欲騙人入其箇中耶大方家以其名之美不可用然則大方家所用皆惡名之方耶夫有醫術有醫道術可暫行一時道可流傳千古道中無術術中無道瀉藥是術補藥是道一時之人不妨瀉千古之人必須補不知其心何若而能作此不通之談有古方有今方有聖方有俗方余以為今人不及古人不敢自立一方六味八味二方已足用原不必更立方也若脾胃惟東垣為聖選而用之以調中益氣補中益氣二方出入增減真知其寒物傷也本方中加熱藥如薑桂之類熱物傷也加黃連之類真知有肉食傷也加山楂數粒酒食傷也加葛花一味隨證調理二方誠有用處然謂必要二方加減則怪談矣此東垣之法方士之繩墨也然以寒治熱而熱不去以熱治寒而寒不除奈何經曰寒之不寒是無水也熱之不熱是無火也壯水之主益火之原此東垣之未及也治脾胃原不專講寒熱蓋飲食勞倦所謂不內外因與壯水益火何涉蓋一時偶不及說到六味八味忽然記起遂著此二語耳如有食填太陰名曰食厥者上部有脈下部無脈不吐則死此語出難經謂上部有脈下部無脈者若其人有吐病則不死蓋吐則氣逆上湧所以下部暫時無脈吐定之後氣平而脈自復非謂無脈之人必令其吐也又並非指食厥而言況食厥證又未必下部無脈者句句皆誤急以陰陽鹽湯探吐其物即愈如有食積腸腹絞痛手不可按者不得不下食未消化如何即下審知其為寒積必用巴豆感應丸何不用八味加下藥審知其為熱積必用大黃承氣湯何不用六味加下藥下之不當死生立判慎之哉人身水火原自均平偏者病也火偏多者補水配火不必去火水偏多者補火配水不必去水凡人身水火有虛實二種實火者外來之邪火與臟腑偏盛之火也虛火者陰氣衰少而火覺有餘也惟水亦然若陰氣並未虧而外來實火及臟中浮火自旺亦補陰以配之將配到幾千百分而後平耶宜其治傷寒陽明壯熱等疾皆用六味也譬之天平此重即彼輕一邊重者只補足輕之一邊決不鑿去馬子蓋馬子一定之數今人欲瀉水降火者鑿馬子者也據爾亦知馬子一定若一頭物重必要增馬子耶或曰正當胸膈飽悶之時數日粒米不下陳皮枳殼木香烏藥日夜吞咽尚且不通復可補乎曰此正因初先不知補益擅用發散克伐太過虛痞之病也經曰下文經語皆是自造無忌憚已極想彼料天下人斷無看內經者故耳下焦虛乏中焦痞滿欲治其虛則中滿愈甚欲消其痞則下焦愈乏庸醫值此難以措手矣疏啓其中峻補其下少用則邪壅於上多用則峻補於下所謂塞因塞用者也善用者能以人參一兩或七八錢少加升麻一錢反用升提且二味亦不成方大劑一服即愈此內經之妙用內經何嘗有此方不可不知也中暑傷暑論中暑者面垢自汗口燥悶倒昏不知人背冷手足微冷或吐或瀉或喘或滿是也當是時切勿便與冷水或臥冷地如行路暍死者即置日中熱地上以小便溺熱土上取熱土罨病人臍上急以二氣丹同蘇合香丸湯調灌下如無二氣丹研蒜水灌之亦可蓋中傷暑毒外陽內陰諸暑藥多用暖劑如大順散之用薑桂枇杷葉散之用丁香蒜亦辛熱之物又蒜氣臭烈能通諸竅也中暑用熱又是暑中之一證千不得一或因好涼太過或其人本屬虛極或因暑邪入中汗出太過陽越於外古方仍有用辛熱者然必審其沉寒之脈證全具方可一用乃以為暑證盡然則殺人如麻矣此人凡論一病必以此病中之極少者立論真可恨也傷暑而苦頭痛發躁惡熱捫之肌膚大熱必大渴引飲汗大泄齒燥無氣以動乃為暑傷氣蒼朮白虎主之有暑而無濕者蒼朮亦不可用若人元氣不足用前藥不應惟清暑益氣湯或補中益氣湯為當自汗多而氣上反用升柴熱氣未清反用參術與爾何仇必欲殺大抵夏月陽氣浮於外爾亦知陽浮何以用升柴也陰氣伏於內若人飲食勞倦內傷中氣或酷暑勞役外傷陽氣者多患之法當調補元氣為主暑氣未清而補即補暑矣夏月服補而卒死者我見亦多矣皆此等邪說殺之也而佐以解暑若陰寒之證用大順散桂附大辛熱之藥此內經舍時從證之良法內經何嘗有此議論不可不知清暑益氣湯黃耆蒼朮升麻人參白朮陳皮神麯澤瀉甘草黃柏葛根青皮當歸麥冬五味雜出不倫古人制方之義至此而盡醫道之一厄也白虎湯石膏知母甘草人參糯米此是白虎加人參湯不得只名白虎湯此方是暑月熱病發熱之正方白虎湯仲景治傷寒汗后里熱等證加人參名人參白虎湯治汗後表解大渴之證金匱亦藉以治太陽中暍之證乃隨手録一方而有數誤焉非治暑正方一也以白虎加人參湯指為白虎湯二也以粳米改糯米三也以為只夏月可用余月不可用四也其每動必誤如此濕論東垣曰治濕不利小便非其治也又曰在下者引而竭之聖人之言雖布在方策其不盡者可以意求耳夫濕淫從外而入里若用淡滲之劑是降之又降乃復益其陰而重竭其陽利濕如何是益陰竭陽豈濕氣是陽耶則陽氣愈消而精神愈短矣是陰重強陽重衰反助其邪之謂也濕而利之是助何邪故用升陽風藥即瘥以羌活獨活柴胡升麻各一錢用水煎熱服四味風藥亦不成方大法云熱淫所勝助風以平之又假造內經經云濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之正上文淡滲利水之義乃捏出此怪語是何肺腸又曰下者舉之下者舉之為正氣下陷則提之非欲舉濕也得陽氣升騰而愈矣又曰客者除之是因曲而為之直也利水即是除客反要提在上焦將何以除之耶曲直二字亦糊塗夫聖人之法可以類推是舉一而知百也有腳氣類傷寒者發熱惡寒必腳脛間腫痛俱從濕治腳氣大段因濕為多然治法亦不一也有濕熱發黃者當從郁治凡濕熱之物不鬱則不黃禁用茵陳五苓散茵陳五苓治濕之正方也凡古人相傳治病正方猶之飢者之食五穀一定不易其以肴蔬下之則加減法也或米或麥之不同則審用法也更或五果五菜之單食則變通法也若謂古方不可用則猶云凡飢者禁食五穀服者十不一生也嗟乎是尚得為人言哉凡見用茵陳五苓散者十不一生仲景殺過幾人當用逍遙散方見郁論豫一日患陰丸一個腫如鴨卵發熱是濕熱證治之不效細思之數日前從定海小船回有濕布風帆在坐下比上岸始覺以意逆之此感寒濕在腎丸也乃用六味地黃加柴胡吳萸肉桂各一錢獨活五分知其為濕仍必用六味又必柴胡此理莫解至服此而病幸愈者蓋一時輕疾得茱萸肉桂獨活等辛散之藥自然六味不能為害耳一服熱退再服腫消後有患偏墜者此方多效瘧論或問曰經云夏傷於暑秋必病瘧前人雖備言之旨殊未暢盍明示諸曰不發於夏而發於秋此亢則害承乃制子來救母之義內經瘧論言之甚詳不容再贅一語偏要扯出六節氣位亢害承製之論以欺人又全然不曉其義豈不汗顏蓋暑令當權君火用事肺金必受傷克火位之下水氣承之腎水為肺之子因母受火傷子來承之如此則瘧乃肺病而寒熱則心腎交戰之病也亂道無理一至於此以制火救母於是水火相戰陰陽交爭大勝則大復小勝則小復此陰陽勝復之常理瘧之所由作也然而有病有不病者蓋邪之所湊其氣必虛故其人元氣不固者暑邪得以承之所以治瘧以扶元氣為主瘧邪方熾如何扶元且爾所謂扶元必是六味助了腎水以滅君火火氣從此大敗其人遂終冷不熱奈何奈何發在夏至後處暑前者此三陽受病傷之淺者近而暴也發在處暑後冬至前者此三陰受病陰陽受病之故內經言之甚悉何嘗以時之前後分陰陽傷之重者遠而深也至於陰虛者其寒熱亦與正瘧無異而陰瘧中又有真陰真陽之分先做六味八味地步人所不知經曰晝見夜伏夜見晝止按時而發是無水也晝見夜伏夜見晝止倏忽往來時止時作是無火也又假造經文以寒熱准者皆是無水不準者皆見無火豈非亂道無水者壯水之主以鎮陽光六味湯主之無火者益火之原以消陰翳八味湯主之二方豈是治寒熱之藥非但作書者可厭即辨者亦可厭矣世患久瘧而不愈者非瘧不可愈乃治之不如法也丹溪云夜發者邪入陰分宜用血藥引出陽分當歸川芎紅花生地黃柏治之亦未及真陰真陽之至理遍考諸書瘧論並未能露其意天下之病盡用六味八味千古只有爾獨得之祕非但治瘧無人能得此意也且余常試有神驗故特表而出焉痢疾論世有瘧後痢者亦有痢後瘧者夫既為瘧後發泄已盡必無暑熱之毒復為痢疾瘧邪未清中氣復虛邪從內陷此正暑毒陷入臟腑之疾最為險證也此是元氣下陷脾氣不能升舉似痢非痢也非痢將指為何病既為痢後下多則亡血氣又隨痢散陰陽兩虛陽虛則惡寒陰虛則惡熱故寒熱交戰似瘧非瘧也雖系氣血兩虛既復寒熱交爭則是邪仍向外仲景傷寒論中凡陰病轉陽皆易愈之候此乃痢轉為瘧病屬可治若不指為瘧竟作陰虛陽虛論則久病壞症死期將至亦非補中益氣所能愈也則俱作虛論俱用補中益氣加溫補其病自愈細閲此書何必嘵嘵著成數卷只兩言括之曰陰虛用六味陽虛用八味足矣讀者亦不必終帙只記二方而千聖之妙訣已傳濟世之良法已盡所以天下庸醫一見此書無不狂喜以為天下有如此做名醫之捷徑恨讀之猶晚也殺人之法從此遍天下矣嗟乎無源亂道何地無之原不足與辨因晚村輩力為崇奉而流毒遂無盡故作書者之罪小而表章者之罪大也
