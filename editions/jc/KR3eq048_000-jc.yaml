front:
  text: 序小道之中切於民生日用者醫卜二端而已卜者最不可憑而可憑醫者最可憑而不可憑者也蓋卜之為道布策開兆毫無據依而萬事萬物之隱微變態俱欲先知洞察此最不可憑者也然驗者應若桴鼓不驗者背若冰炭愚夫愚婦皆能辨其技之工拙也若醫之為道辨症定方彰彰可考薑桂入口即熱芩連下咽知寒巴黃必瀉參術必補莫不顯然但病無即愈即死之理症有假熱假寒之異上下殊方六經異治先後無容顛越輕重不得倒施愈期有久暫之數傳變有淺深之別或藥不中病反有小效或治依正法竟無近功有效後而加病者有無效而病漸除者有藥本無誤病適當劇即歸咎於藥者有藥本大誤其害未發反歸功於藥者病家者不知也醫者亦不知也因而聚訟紛紜遂至亂投藥石誰殺之誰生之竟無一定之論此最無憑者也事既無憑則技之良賤何由而定曰有之世故熟形狀偉剿說多時命通見機便捷交遊推獎則為名醫殺人而人不知也知之亦不怨也反此者則為庸醫有功則曰偶中有咎則盡歸之故醫道不可憑而醫之良賤更不可憑也若趙養葵醫貫之盛行於世則非趙氏之力自能如此也晚村呂氏負一時之盛名當世信其學術而並信其醫彼以為是誰敢曰非況只記數方遂傳絕學藝極高而功極易效極速而名極美有不風行天下者耶如是而殺人之術遂無底止矣嗚呼為盜之害有盡而賞盜之害無盡蓋為盜不過一身誅之則人盡知懲賞盜則教天下之人胥為盜也禍寧有窮哉余悲民命之所關甚大因擇其反經背道之尤者力為辨析名之曰醫貫砭以請正於明理之君子冀相與共弭其禍雖甚不便於崇信醫貫之人或遭謗黷亦所不惜也乾隆六年二月既望洄溪徐大椿題
